<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>トレーニングモード｜日本史</title>

<style>
:root{
--bg:#f6efe7;
--card:#fffdf9;
--line:#e5cfbb;
--ink:#2d2925;
--accent:#b71c1c;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
background:linear-gradient(135deg,#fff8ef,#efe4d6);
color:var(--ink);
overflow-x:hidden;
}

.app{
max-width:1100px;
margin:0 auto;
padding:12px;
}

.card{
background:rgba(255,253,249,.95);
border:2px solid #e5cfbb;
border-radius:24px;
padding:18px;
box-shadow:0 12px 28px rgba(0,0,0,.08);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:12px;
}

.title{
font-size:clamp(28px,4vw,44px);
font-weight:900;
}

.sub{
font-size:14px;
font-weight:700;
color:#6c5f55;
}

.menuBtn{
border:none;
border-radius:14px;
padding:12px 16px;
background:#1d3557;
color:white;
font-weight:900;
cursor:pointer;
box-shadow:0 5px 0 #0d2035;
}

.hero{
display:grid;
grid-template-columns:1fr 320px;
gap:14px;
}

.info{
background:#fff8ea;
border:2px solid #ead6c3;
border-radius:22px;
padding:18px;
margin-bottom:14px;
}

.info h2{
margin:0 0 10px;
font-size:clamp(36px,5vw,58px);
line-height:1.05;
}

.info p{
margin:0;
line-height:1.7;
font-size:clamp(16px,2vw,22px);
font-weight:800;
color:#5b5048;
}

.timeline{
background:white;
border:2px solid #ead6c3;
border-radius:22px;
padding:16px;
margin-bottom:14px;
}

.timelineTitle{
font-size:22px;
font-weight:900;
margin-bottom:12px;
}

.flow{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.node{
padding:10px 12px;
border-radius:999px;
background:#eee2d4;
font-size:14px;
font-weight:900;
transition:.25s;
}

.node.active{
background:#c62828;
color:white;
transform:scale(1.06);
}

.mapWrap{
background:white;
border:2px solid #ead6c3;
border-radius:22px;
padding:14px;
}

.mapTitle{
font-size:22px;
font-weight:900;
margin-bottom:10px;
}

.map{
background:#f7f7f7;
border-radius:18px;
padding:10px;
}

.point{
fill:#cfcfcf;
transition:.25s;
}

.point.active{
fill:#d62828;
}

.pointLabel{
font-size:11px;
font-weight:900;
fill:#333;
}

.right{
background:#fffaf4;
border:2px dashed #e4cfbc;
border-radius:22px;
padding:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.rabbit{
width:min(260px,70vw);
object-fit:contain;
filter:drop-shadow(0 10px 10px rgba(0,0,0,.12));
}

.speech{
margin-top:12px;
background:#fff8d8;
border:3px solid #111;
border-radius:18px;
padding:14px;
font-weight:900;
line-height:1.5;
text-align:center;
box-shadow:4px 4px 0 #111;
}

.quiz{
margin-top:16px;
background:white;
border:2px solid #ead6c3;
border-radius:22px;
padding:18px;
}

.status{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:12px;
flex-wrap:wrap;
}

.badge{
background:#f0e3d5;
border-radius:999px;
padding:8px 12px;
font-weight:900;
}

.question{
font-size:clamp(22px,3vw,34px);
font-weight:900;
line-height:1.45;
margin-bottom:14px;
}

.choices{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.choice{
border:2px solid #d9c7b7;
background:white;
border-radius:18px;
padding:14px;
font-weight:900;
font-size:18px;
text-align:left;
cursor:pointer;
color:#1265a8;
box-shadow:0 4px 0 #d0bba8;
}

.choice.correct{
background:#e7fff0;
border-color:#14824d;
color:#14824d;
}

.choice.wrong{
background:#fff0f0;
border-color:#c62828;
color:#c62828;
}

.learn{
display:none;
margin-top:14px;
background:#fff8ea;
border:2px solid #efcf9e;
border-radius:18px;
padding:14px;
line-height:1.7;
}

.learn.show{
display:block;
}

.next{
margin-top:14px;
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
}

.next button{
border:none;
border-radius:14px;
padding:12px 16px;
font-weight:900;
cursor:pointer;
}

.red{
background:#b71c1c;
color:white;
box-shadow:0 5px 0 #7f1111;
}

.blue{
background:#1d3557;
color:white;
box-shadow:0 5px 0 #0d2035;
}

@media(max-width:850px){

.hero{
grid-template-columns:1fr;
}

.choices{
grid-template-columns:1fr;
}

}
</style>
</head>

<body>

<div class="app">

<div class="card">

<div class="top">
<div>
<div class="title">トレーニングモード</div>
<div class="sub">流れ・場所・時系列で理解する</div>
</div>

<button class="menuBtn"
onclick="location.href='index.html'">
メニューへ
</button>
</div>

<div class="hero">

<div>

<div class="info">
<h2>歴史は、<br>流れで覚える。</h2>

<p>
単語だけを暗記するのではなく、<br>
「何が起こり、何が変わったか」をつなげよう。
</p>
</div>

<div class="timeline">
<div class="timelineTitle">時系列</div>

<div id="flow" class="flow"></div>
</div>

<div class="mapWrap">

<div class="mapTitle">
どこで起こった？
</div>

<div class="map">

<svg viewBox="0 0 500 320">

<rect width="500" height="320"
fill="#f6f6f6"/>

<path
d="M120 40 L220 20 L320 40 L390 90 L410 170 L350 250 L250 290 L150 260 L100 180 L90 100 Z"
fill="#ececec"
stroke="#bbb"
stroke-width="3"/>

<circle id="uraga" class="point"
cx="340" cy="205" r="10"/>
<text x="354" y="209"
class="pointLabel">浦賀</text>

<circle id="shimoda" class="point"
cx="300" cy="240" r="10"/>
<text x="314" y="244"
class="pointLabel">下田</text>

<circle id="hakodate" class="point"
cx="380" cy="60" r="10"/>
<text x="394" y="64"
class="pointLabel">箱館</text>

<circle id="yokohama" class="point"
cx="320" cy="185" r="10"/>
<text x="334" y="189"
class="pointLabel">横浜</text>

<circle id="edo" class="point"
cx="310" cy="170" r="10"/>
<text x="324" y="174"
class="pointLabel">江戸</text>

<circle id="kagoshima" class="point"
cx="120" cy="250" r="10"/>
<text x="134" y="254"
class="pointLabel">鹿児島</text>

<circle id="shimonoseki" class="point"
cx="160" cy="200" r="10"/>
<text x="174" y="204"
class="pointLabel">下関</text>

</svg>

</div>
</div>

</div>

<div class="right">

<img id="rabbit"
src="images/rabbit07.png"
class="rabbit">

<div id="speech"
class="speech">
まずは流れを見よう！
</div>

</div>

</div>

<div class="quiz">

<div class="status">
<div id="count"
class="badge">1 / 6</div>

<div id="score"
class="badge">正解 0</div>
</div>

<div id="question"
class="question"></div>

<div id="choices"
class="choices"></div>

<div id="learn"
class="learn"></div>

<div class="next">

<button class="blue"
onclick="toggleLearn()">
流れメモ
</button>

<button id="nextBtn"
class="red"
onclick="nextQ()"
disabled>
次へ
</button>

</div>

</div>

</div>

</div>

<script>

const FLOW=[
'ペリー来航',
'和親条約',
'ハリス来日',
'修好通商条約',
'貿易開始',
'尊攘事件'
];

const DATA=[

{
q:'ペリーが浦賀へ来航した年は？',
a:'1853年',
o:['1853年','1854年','1858年','1860年'],
flow:'ペリー来航',
place:['uraga'],
learn:'1853年、ペリーが浦賀へ来航。ここから日本は開国へ向かっていく。'
},

{
q:'1854年に結ばれた条約は？',
a:'日米和親条約',
o:['日米和親条約','日米修好通商条約','天津条約','日露修好通商条約'],
flow:'和親条約',
place:['shimoda','hakodate'],
learn:'和親条約で下田・箱館が開港。「まず仲良く」の段階。'
},

{
q:'下田に来たアメリカ総領事は？',
a:'ハリス',
o:['ハリス','ペリー','ヒュースケン','プチャーチン'],
flow:'ハリス来日',
place:['shimoda'],
learn:'ハリスは下田へ。ここから通商条約への圧力が始まる。'
},

{
q:'1858年に結ばれた条約は？',
a:'日米修好通商条約',
o:['日米修好通商条約','日米和親条約','安政の五カ国条約','天津条約'],
flow:'修好通商条約',
place:['yokohama'],
learn:'修好通商条約で本格的な貿易へ。不平等条約として重要。'
},

{
q:'1860年に起きた事件は？',
a:'桜田門外の変',
o:['桜田門外の変','坂下門外の変','生麦事件','東禅寺事件'],
flow:'尊攘事件',
place:['edo'],
learn:'安政の大獄への反発が、桜田門外の変へ。'
},

{
q:'1863年に起きた戦争は？',
a:'薩英戦争',
o:['薩英戦争','下関戦争','戊辰戦争','西南戦争'],
flow:'尊攘事件',
place:['kagoshima'],
learn:'薩摩は薩英戦争で、西洋軍事力の強さを知る。'
}

];

let idx=0;
let score=0;
let locked=false;

function shuffle(a){
return [...a].sort(()=>Math.random()-.5);
}

function renderFlow(active){

const flow=document.getElementById('flow');

flow.innerHTML='';

FLOW.forEach(x=>{

const d=document.createElement('div');

d.className='node'+
(x===active?' active':'');

d.textContent=x;

flow.appendChild(d);

});

}

function clearMap(){

document.querySelectorAll('.point')
.forEach(x=>x.classList.remove('active'));

}

function lightMap(list){

clearMap();

list.forEach(id=>{

const el=document.getElementById(id);

if(el)el.classList.add('active');

});

}

function showQ(){

locked=false;

const item=DATA[idx];

document.getElementById('count')
.textContent=
`${idx+1} / ${DATA.length}`;

document.getElementById('score')
.textContent=
`正解 ${score}`;

document.getElementById('question')
.textContent=item.q;

document.getElementById('learn')
.classList.remove('show');

document.getElementById('nextBtn')
.disabled=true;

renderFlow(item.flow);

lightMap(item.place);

const box=document.getElementById('choices');

box.innerHTML='';

shuffle(item.o).forEach(opt=>{

const b=document.createElement('button');

b.className='choice';

b.textContent=opt;

b.onclick=()=>answer(b,opt,item);

box.appendChild(b);

});

}

function answer(btn,opt,item){

if(locked)return;

locked=true;

document.querySelectorAll('.choice')
.forEach(b=>{

if(b.textContent===item.a){

b.classList.add('correct');

}

});

if(opt===item.a){

score++;

document.getElementById('speech')
.innerHTML='その流れだ！';

document.getElementById('rabbit')
.src='images/rabbit16.png';

}else{

btn.classList.add('wrong');

document.getElementById('speech')
.innerHTML='ここで流れを確認！';

document.getElementById('rabbit')
.src='images/rabbit09.png';

}

document.getElementById('score')
.textContent=`正解 ${score}`;

document.getElementById('learn')
.innerHTML=item.learn;

document.getElementById('learn')
.classList.add('show');

document.getElementById('nextBtn')
.disabled=false;

}

function nextQ(){

idx++;

if(idx>=DATA.length){

finish();

return;

}

showQ();

}

function finish(){

document.querySelector('.quiz')
.innerHTML=`

<div style="text-align:center;padding:20px">

<img src="images/rabbit01.png"
class="rabbit"
style="max-width:220px">

<h2 style="
font-size:54px;
margin:10px 0">
トレーニング完了！
</h2>

<div style="
font-size:42px;
font-weight:900;
color:#b71c1c">
${score}/${DATA.length}
</div>

<p style="
font-size:22px;
font-weight:800;
line-height:1.7">

次はアドバンストレーニングで、<br>
「なぜ変化したか」を理解しよう。

</p>

<div style="
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-top:20px">

<button class="blue"
onclick="location.href='index3.html'">
アドバンスへ
</button>

<button class="red"
onclick="location.href='index.html'">
通常クイズへ
</button>

</div>

</div>

`;

}

function toggleLearn(){

document.getElementById('learn')
.classList.toggle('show');

}

showQ();

</script>

</body>
</html>
