<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>アドバンストレーニング</title><style>
:root{--bg:#f7efdd;--card:#fffaf0;--line:#e6c88f;--ink:#2b241f;--red:#b71c1c;--blue:#1d3557;--gold:#ffd166;--soft:#f2e2c3;--green:#e7fff0;--pink:#fff1f6}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#fff7eb,#f2e4d0);color:var(--ink);overflow-x:hidden}button{font:inherit}.wrap{max-width:1120px;margin:auto;padding:14px}.card{background:rgba(255,250,240,.96);border:3px solid var(--line);border-radius:28px;box-shadow:0 12px 30px rgba(80,50,25,.14);padding:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.brand img{width:58px;height:58px;object-fit:contain}.title{font-size:clamp(28px,4vw,44px);font-weight:900;line-height:1.05}.sub{font-size:14px;color:#6b5d4a;font-weight:800}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.nav button{border:3px solid #d7b66f;background:#fff;border-radius:16px;padding:10px 14px;text-decoration:none;color:#382b1d;font-weight:900;box-shadow:0 4px 0 rgba(0,0,0,.12);cursor:pointer}.rabbit{max-width:min(260px,70vw);object-fit:contain;filter:drop-shadow(0 10px 10px rgba(0,0,0,.14))}.speech{background:#fff8d8;border:3px solid #111;border-radius:18px;padding:13px;font-weight:900;line-height:1.5;text-align:center;box-shadow:4px 4px 0 #111}.btn{border:none;border-radius:16px;padding:13px 16px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.18)}.red{background:var(--red);color:#fff}.blue{background:var(--blue);color:#fff}.gold{background:var(--gold);color:#2b241f}.pill{background:#f0e3d5;border-radius:999px;padding:8px 12px;font-weight:900}.choice{border:2px solid #d9c7b7;background:white;border-radius:18px;padding:14px;font-weight:900;font-size:18px;text-align:left;cursor:pointer;color:#1265a8;box-shadow:0 4px 0 #d0bba8}.choice.correct{background:#e7fff0;border-color:#14824d;color:#14824d}.choice.wrong{background:#fff0f0;border-color:#c62828;color:#c62828}@media(max-width:850px){.wrap{padding:10px}.top{align-items:flex-start}.nav{width:100%;display:grid;grid-template-columns:1fr}.nav a,.nav button{text-align:center}.brand img{width:46px;height:46px}}

.grid{display:grid;grid-template-columns:1.08fr .92fr;gap:14px}.box{background:#fff;border:3px solid var(--line);border-radius:24px;padding:16px}.type{display:inline-block;background:#fff0f0;color:#b71c1c;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:900}.q{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.45;margin:12px 0}.choices{display:grid;gap:10px}.support{background:#fff8ea;border:2px solid #efcf9e;border-radius:18px;padding:14px;line-height:1.8;font-weight:800}.gaugeLabel{font-weight:900;margin:10px 0 4px}.gauge{height:18px;background:#eee2d4;border-radius:999px;overflow:hidden}.gauge span{display:block;height:100%;background:linear-gradient(90deg,#ffd166,#b71c1c);transition:.4s}.explain{display:none;margin-top:12px;background:#fff8ea;border:2px solid #efcf9e;border-radius:18px;padding:14px;line-height:1.7;font-weight:800}.explain.show{display:block}@media(max-width:850px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div class="brand"><img src="images/rabbit14.png"><div><div class="title">アドバンストレーニング</div><div class="sub">比較・理由・因果関係で理解する</div></div></div><div class="nav"><a href="index.html">メニュー</a><a href="index2.html">トレーニング</a></div></div><div class="grid" id="stage"><div class="box"><div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap"><span id="count" class="pill"></span><span id="score" class="pill"></span></div><div id="type" class="type"></div><div id="q" class="q"></div><div id="choices" class="choices"></div><div id="explain" class="explain"></div><div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap"><button class="btn blue" onclick="toggleExplain()">解説</button><button id="nextBtn" class="btn red" onclick="nextQ()" disabled>次へ</button></div></div><div class="box"><h2>理解サポート</h2><div id="support" class="support"></div><div class="gaugeLabel">外圧・危機感</div><div class="gauge"><span id="g1"></span></div><div class="gaugeLabel">開国・通商の進行</div><div class="gauge"><span id="g2"></span></div><div class="gaugeLabel">国内混乱・政治対立</div><div class="gauge"><span id="g3"></span></div><div style="text-align:center;margin-top:14px"><img id="rabbit" src="images/rabbit14.png" class="rabbit"><div id="speech" class="speech">理由を考えよう！</div></div></div></div></div></div><script>const ADV=[{"type": "政策変化", "q": "異国船打払令から天保の薪水給与令へ変わった理由は？", "a": "アヘン戦争で清が敗れ、強硬策だけでは危険だと考えたから", "o": ["アヘン戦争で清が敗れ、強硬策だけでは危険だと考えたから", "ペリーが将軍になったから", "横浜が貿易の中心地になったから", "五品江戸廻送令が出たから"], "support": "異国船打払令＝追い払う／天保の薪水給与令＝水・燃料を与える。背景はアヘン戦争の衝撃。", "g": [70, 10, 20]}, {"type": "比較", "q": "ビッドルとペリーの違いは？", "a": "ビッドルは1846年に来航、ペリーは1853年に来航し開国の直接のきっかけとなった", "o": ["ビッドルは1846年に来航、ペリーは1853年に来航し開国の直接のきっかけとなった", "ビッドルはロシア、ペリーは清の使節だった", "ビッドルは日米修好通商条約を結んだ", "ペリーは長崎に来航した"], "support": "ビッドルは前段階、ペリーは開国の直接の衝撃。", "g": [75, 30, 30]}, {"type": "条約比較", "q": "日米和親条約と日米修好通商条約の違いは？", "a": "和親条約は補給中心、修好通商条約は本格的な貿易開始", "o": ["和親条約は補給中心、修好通商条約は本格的な貿易開始", "和親条約は倒幕、修好通商条約は公武合体", "和親条約は貿易章程、修好通商条約は薪水給与令", "違いはない"], "support": "1854年＝和親、1858年＝修好通商。開国の段階が進む。", "g": [70, 65, 40]}, {"type": "因果", "q": "第2次アヘン戦争と日米修好通商条約の関係は？", "a": "清が劣勢になったことを利用して、ハリスが日本に通商条約を迫った", "o": ["清が劣勢になったことを利用して、ハリスが日本に通商条約を迫った", "清が日本を守ったため条約を拒否できた", "天津条約によって鎖国が強化された", "ペリーが天津条約を結んだ"], "support": "中国情勢は日本外交にも影響。ハリスの圧力材料になった。", "g": [90, 70, 55]}, {"type": "不平等条約", "q": "安政の五カ国条約が不平等条約とされる理由は？", "a": "領事裁判権を認め、関税自主権がなかったから", "o": ["領事裁判権を認め、関税自主権がなかったから", "鎖国を続けられたから", "幕府が自由に関税を決められたから", "外国人が日本で裁判を受けられなくなったから"], "support": "領事裁判権＋関税自主権の欠如。後の条約改正につながる。", "g": [80, 75, 70]}, {"type": "貿易影響", "q": "金貨が海外に流出した理由は？", "a": "日本と海外で金銀比価が違っていたから", "o": ["日本と海外で金銀比価が違っていたから", "ペリーが金貨を没収したから", "五品江戸廻送令で金貨が禁止されたから", "下田が閉鎖されたから"], "support": "金銀比価の相違により、日本の金が海外へ流出。幕府は万延小判で対応。", "g": [65, 85, 75]}, {"type": "流通統制", "q": "五品江戸廻送令のねらいは？", "a": "開港場への直送を制限し、江戸問屋と流通を守るため", "o": ["開港場への直送を制限し、江戸問屋と流通を守るため", "ペリー来航を止めるため", "日米和親条約を結ぶため", "外国人を長崎に集めるため"], "support": "貿易開始で商品が開港場へ流れ、江戸問屋が打撃を受けた。", "g": [55, 85, 70]}, {"type": "尊攘事件", "q": "ヒュースケン事件・東禅寺事件・生麦事件・イギリス公使館焼打ち事件に共通する背景は？", "a": "開国後、外国人への反発や尊王攘夷の動きが強まったこと", "o": ["開国後、外国人への反発や尊王攘夷の動きが強まったこと", "幕府が完全に安定したこと", "鎖国が強化され外国人が来なくなったこと", "米価が下がって農民一揆が消えたこと"], "support": "開国・不平等条約への不満が外国人襲撃事件として表面化した。", "g": [75, 80, 95]}, {"type": "後継問題", "q": "徳川家定の病弱さが将軍継嗣問題につながった理由は？", "a": "嗣子がなく、次の将軍を誰にするかで対立が起こったから", "o": ["嗣子がなく、次の将軍を誰にするかで対立が起こったから", "ペリーが将軍になったから", "横浜が閉鎖されたから", "天保の薪水給与令が廃止されたから"], "support": "徳川慶喜を推す一橋派など、幕府内部の政治対立につながる。", "g": [60, 50, 80]}];let idx=0,score=0,locked=false;function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function showQ(){locked=false;let it=ADV[idx];document.getElementById('count').textContent=`${idx+1}/${ADV.length}`;document.getElementById('score').textContent=`正解 ${score}`;document.getElementById('type').textContent=it.type;document.getElementById('q').textContent=it.q;document.getElementById('support').textContent=it.support;document.getElementById('explain').classList.remove('show');document.getElementById('explain').textContent=it.support;document.getElementById('nextBtn').disabled=true;document.getElementById('g1').style.width=it.g[0]+'%';document.getElementById('g2').style.width=it.g[1]+'%';document.getElementById('g3').style.width=it.g[2]+'%';document.getElementById('rabbit').src='images/rabbit14.png';document.getElementById('speech').textContent='理由を考えよう！';let box=document.getElementById('choices');box.innerHTML='';shuffle(it.o).forEach(opt=>{let b=document.createElement('button');b.className='choice';b.textContent=opt;b.onclick=()=>answer(b,opt,it);box.appendChild(b)})}function answer(btn,opt,it){if(locked)return;locked=true;document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===it.a)b.classList.add('correct')});if(opt===it.a){score++;document.getElementById('rabbit').src='images/rabbit16.png';document.getElementById('speech').textContent='理解できてる！'}else{btn.classList.add('wrong');document.getElementById('rabbit').src='images/rabbit09.png';document.getElementById('speech').textContent='ここが理解ポイント！'}document.getElementById('score').textContent=`正解 ${score}`;document.getElementById('explain').classList.add('show');document.getElementById('nextBtn').disabled=false}function toggleExplain(){document.getElementById('explain').classList.toggle('show')}function nextQ(){idx++;if(idx>=ADV.length)finish();else showQ()}function finish(){document.getElementById('stage').innerHTML=`<div class="box" style="text-align:center;grid-column:1/-1"><img src="images/rabbit01.png" class="rabbit"><h1>アドバンス完了！</h1><div style="font-size:46px;font-weight:900;color:#b71c1c">${score}/${ADV.length}</div><p style="font-weight:800;line-height:1.7">理由まで確認できました。最後は通常クイズで定着しよう。</p><button class="btn gold" onclick="location.href='index.html'">通常クイズへ</button></div>`}showQ();</script></body></html>
