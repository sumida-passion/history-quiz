:root{--bg:#f7efdd;--card:#fffaf0;--line:#e6c88f;--ink:#2b241f;--red:#b71c1c;--blue:#1d3557;--gold:#ffd166;--soft:#f2e2c3;--green:#e7fff0;--pink:#fff1f6}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#fff7eb,#f2e4d0);color:var(--ink);overflow-x:hidden}button{font:inherit}.wrap{max-width:1120px;margin:auto;padding:14px}.card{background:rgba(255,250,240,.96);border:3px solid var(--line);border-radius:28px;box-shadow:0 12px 30px rgba(80,50,25,.14);padding:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.brand img{width:58px;height:58px;object-fit:contain}.title{font-size:clamp(28px,4vw,44px);font-weight:900;line-height:1.05}.sub{font-size:14px;color:#6b5d4a;font-weight:800}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.nav button{border:3px solid #d7b66f;background:#fff;border-radius:16px;padding:10px 14px;text-decoration:none;color:#382b1d;font-weight:900;box-shadow:0 4px 0 rgba(0,0,0,.12);cursor:pointer}.rabbit{max-width:min(260px,70vw);object-fit:contain;filter:drop-shadow(0 10px 10px rgba(0,0,0,.14))}.speech{background:#fff8d8;border:3px solid #111;border-radius:18px;padding:13px;font-weight:900;line-height:1.5;text-align:center;box-shadow:4px 4px 0 #111}.btn{border:none;border-radius:16px;padding:13px 16px;font-weight:900;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.18)}.red{background:var(--red);color:#fff}.blue{background:var(--blue);color:#fff}.gold{background:var(--gold);color:#2b241f}.pill{background:#f0e3d5;border-radius:999px;padding:8px 12px;font-weight:900}.choice{border:2px solid #d9c7b7;background:white;border-radius:18px;padding:14px;font-weight:900;font-size:18px;text-align:left;cursor:pointer;color:#1265a8;box-shadow:0 4px 0 #d0bba8}.choice.correct{background:#e7fff0;border-color:#14824d;color:#14824d}.choice.wrong{background:#fff0f0;border-color:#c62828;color:#c62828}@media(max-width:850px){.wrap{padding:10px}.top{align-items:flex-start}.nav{width:100%;display:grid;grid-template-columns:1fr}.nav a,.nav button{text-align:center}.brand img{width:46px;height:46px}}

.hero{display:grid;grid-template-columns:1fr .9fr;gap:18px}.catch{background:#fff8ea;border:3px solid var(--line);border-radius:24px;padding:24px}.catch h1{font-size:clamp(38px,6vw,72px);line-height:1.05;margin:0 0 14px}.catch p{font-size:clamp(16px,2vw,24px);line-height:1.7;font-weight:850;color:#5b5048}.modes{display:grid;gap:12px}.mode{border:3px solid #d7b66f;border-radius:22px;padding:18px;text-align:left;box-shadow:0 6px 0 rgba(0,0,0,.14);cursor:pointer}.mode h2{font-size:clamp(24px,3.4vw,38px);margin:0 0 6px}.mode p{margin:0;font-weight:800;line-height:1.5}.training{background:#eef6ff;border-color:#b9d8ff}.advanced{background:#fff1f6;border-color:#f0bfd1}.normal{background:#ffd166;border-color:#e5a82f}.stage{background:#fff;border:3px solid var(--line);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px}.select{display:none;margin-top:14px;background:#fff;border:3px solid var(--line);border-radius:24px;padding:18px}.selectGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.quizArea{display:none;margin-top:14px;background:#fff;border:3px solid var(--line);border-radius:24px;padding:18px}.status{display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px}.q{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.45;margin:12px 0}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}.learn{display:none;margin-top:12px;background:#fff8ea;border:2px solid #efcf9e;border-radius:18px;padding:14px;font-weight:800;line-height:1.7}.learn.show{display:block}.result{display:none;text-align:center;margin-top:14px;background:#fff;border:3px solid var(--line);border-radius:24px;padding:20px}.cert{display:none;margin:16px auto;padding:18px;border:8px double #d4a536;border-radius:20px;background:#fffbe8;max-width:700px}.cert.show{display:block}@media(max-width:850px){.hero{grid-template-columns:1fr}.selectGrid,.choices{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card"><div class="top"><div class="brand"><img src="images/rabbit01.png"><div><div class="title">幕末うさぎ歴史クイズ</div><div class="sub">開国と幕末の動乱 p203〜207</div></div></div><div class="nav"><a href="index2.html">トレーニング</a><a href="index3.html">アドバンス</a></div></div><div id="home" class="hero"><div><div class="catch"><h1>まずは流れ。<br>そのあと、一気に覚える。</h1><p>トレーニングで枠組みを作り、アドバンスで理解を深め、最後に通常クイズで高速反復します。</p></div><div class="modes"><button class="mode training" onclick="location.href='index2.html'"><h2>トレーニングモード</h2><p>時系列・場所・マップ・？？？表示で「点」を作る。</p></button><button class="mode advanced" onclick="location.href='index3.html'"><h2>アドバンストレーニング</h2><p>比較・理由・因果関係を理解する。</p></button><button class="mode normal" onclick="showSelect()"><h2>通常クイズ</h2><p>10問・15問・全問チャレンジで定着。</p></button></div></div><div class="stage"><img src="images/rabbit07.png" class="rabbit"><div class="speech">まずは流れ。<br>そのあと一気に覚える！</div></div></div><div id="select" class="select"><h2>通常クイズ</h2><div class="selectGrid"><button class="btn blue" onclick="startQuiz(10)">10問</button><button class="btn gold" onclick="startQuiz(15)">15問</button><button class="btn red" onclick="startQuiz(DATA.length)">全問チャレンジ</button></div></div><div id="quizArea" class="quizArea"><div class="status"><span id="count" class="pill"></span><span id="score" class="pill"></span><span id="streak" class="pill"></span></div><div id="q" class="q"></div><div id="choices" class="choices"></div><div id="learn" class="learn"></div><div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap"><button id="nextBtn" class="btn red" onclick="nextQ()" disabled>次へ</button><button class="btn blue" onclick="backHome()">メニュー</button></div></div><div id="result" class="result"><img src="images/rabbit01.png" class="rabbit"><h2>結果発表</h2><div id="final" style="font-size:56px;font-weight:900;color:#b71c1c"></div><div id="rank" style="font-size:28px;font-weight:900"></div><p id="advice" style="font-weight:800;line-height:1.7"></p><div id="cert" class="cert"><h2>幕末うさぎマスター認定証</h2><p>全問チャレンジを全問正解でクリアしました。</p></div><button class="btn blue" onclick="backHome()">メニューへ</button></div></div></div><script>const DATA=[{"year": "1842", "place": "江戸・日本沿岸", "flow": "開国前夜", "q": "幕府が異国船打払令を緩和して出した法令は？", "a": "天保の薪水給与令", "o": ["天保の薪水給与令", "五品江戸廻送令", "貿易章程", "異国船打払令"], "memo": "アヘン戦争で清が敗れ、幕府は強硬な打払い一辺倒では危険だと考えた。", "hint": "打ち払う→水や燃料を与える、に変化。", "rabbit": "外国船を追い払うだけでは危ない…！"}, {"year": "1842", "place": "中国", "flow": "開国前夜", "q": "天保の薪水給与令の発令の要因となった中国での戦争は？", "a": "アヘン戦争", "o": ["アヘン戦争", "第2次アヘン戦争", "薩英戦争", "下関戦争"], "memo": "清がイギリスに敗れたことで、西洋軍事力への危機感が高まった。", "hint": "清とイギリスの戦争。", "rabbit": "清が負けた…日本も危ない！"}, {"year": "1842", "place": "南京", "flow": "開国前夜", "q": "アヘン戦争で敗れた清とイギリスが結んだ条約は？", "a": "南京条約", "o": ["南京条約", "天津条約", "日米和親条約", "日米修好通商条約"], "memo": "アヘン戦争後に結ばれた条約。日本の対外政策にも影響を与えた。", "hint": "アヘン戦争後の条約。", "rabbit": "南京条約、ここが外圧の警鐘！"}, {"year": "1844", "place": "オランダ", "flow": "開国前夜", "q": "1844年、日本に開国を勧めた国は？", "a": "オランダ", "o": ["オランダ", "ロシア", "イギリス", "アメリカ"], "memo": "オランダ国王は12代将軍徳川家慶に親書を送り、開国を勧めた。", "hint": "鎖国下でも関係が続いていた国。", "rabbit": "オランダからも『開いた方がいい』の声。"}, {"year": "1845", "place": "江戸", "flow": "開国前夜", "q": "1845年に対外政策を検討するために設置された役職は？", "a": "海防掛", "o": ["海防掛", "大老", "総領事", "京都守護職"], "memo": "外国船への対応を検討するため、海防掛が設置された。", "hint": "海の防衛を考える役。", "rabbit": "海を守るには作戦会議だ！"}, {"year": "1846", "place": "浦賀", "flow": "開国前夜", "q": "1846年に浦賀へ来航したアメリカ東インド艦隊司令長官は？", "a": "ビッドル", "o": ["ビッドル", "ペリー", "ハリス", "プチャーチン"], "memo": "ビッドルはペリーより前に来航したが、開国には至らなかった。", "hint": "ペリーの前に浦賀へ来た人物。", "rabbit": "ペリーの前にも来ていた！"}, {"year": "1853", "place": "浦賀", "flow": "ペリー来航", "q": "日本を開国させたアメリカ東インド艦隊司令長官は？", "a": "ペリー", "o": ["ペリー", "ハリス", "ビッドル", "ヒュースケン"], "memo": "1853年、ペリーが浦賀へ来航し、国書を幕府に受理させた。", "hint": "黒船で来航。", "rabbit": "黒船ドーン！ここから大きく動く！"}, {"year": "1853", "place": "浦賀", "flow": "ペリー来航", "q": "ペリーが軍艦4隻を率いて日本に来航したのは西暦何年？", "a": "1853年", "o": ["1853年", "1854年", "1858年", "1860年"], "memo": "ペリー来航は1853年。翌1854年に日米和親条約が結ばれる。", "hint": "いやこみ、黒船で困る。", "rabbit": "1853、いやこみ！"}, {"year": "1853", "place": "浦賀", "flow": "ペリー来航", "q": "ペリーは1853年6月に日本のどこへ来航した？", "a": "浦賀", "o": ["浦賀", "下田", "長崎", "横浜"], "memo": "ペリーは浦賀へ来航。江戸に近く、幕府に大きな衝撃を与えた。", "hint": "江戸湾の入口付近。", "rabbit": "浦賀に黒船、江戸がざわつく！"}, {"year": "1853", "place": "アメリカ", "flow": "ペリー来航", "q": "ペリーが幕府に受理させた国書を出したアメリカ大統領は？", "a": "フィルモア", "o": ["フィルモア", "リンカン", "ワシントン", "セオドア・ルーズベルト"], "memo": "ペリーはフィルモア大統領の国書を持参した。", "hint": "ペリーの国書を出した大統領。", "rabbit": "手紙の差出人も大事！"}, {"year": "1853", "place": "江戸", "flow": "ペリー来航", "q": "ペリー来航時の幕府の老中首座は誰？", "a": "阿部正弘", "o": ["阿部正弘", "井伊直弼", "堀田正睦", "徳川斉昭"], "memo": "阿部正弘は諸大名や朝廷に意見を求め、幕政のあり方が揺れ始めた。", "hint": "ペリー対応で諸大名に意見を求めた老中。", "rabbit": "一人で決められない…相談だ！"}, {"year": "1853", "place": "長崎", "flow": "和親条約", "q": "ペリーに続いて来日したロシアの使節は？", "a": "プチャーチン", "o": ["プチャーチン", "ハリス", "ビッドル", "ヒュースケン"], "memo": "プチャーチンはロシア使節として長崎に来航した。", "hint": "ロシアの使節。", "rabbit": "アメリカだけじゃない、ロシアも来た！"}, {"year": "1853", "place": "長崎", "flow": "和親条約", "q": "1853年にプチャーチンはどこに来航した？", "a": "長崎", "o": ["長崎", "浦賀", "下田", "横浜"], "memo": "プチャーチンは長崎に来航。ロシアも日本に開国を求めた。", "hint": "江戸ではなく九州の港。", "rabbit": "長崎にも外圧が来る！"}, {"year": "1854", "place": "神奈川", "flow": "和親条約", "q": "1854年にペリーが再来日し、江戸幕府と締結した条約は？", "a": "日米和親条約（神奈川条約）", "o": ["日米和親条約（神奈川条約）", "日米修好通商条約", "安政の五カ国条約", "日露和親条約"], "memo": "日米和親条約は1854年。下田・箱館を開き、燃料・食料などを供給した。", "hint": "まずは『和親』。", "rabbit": "まずは港を開くところから。"}, {"year": "1854", "place": "神奈川", "flow": "和親条約", "q": "日米和親条約が締結されたのは西暦何年？", "a": "1854年", "o": ["1854年", "1853年", "1858年", "1860年"], "memo": "1853年ペリー来航、1854年日米和親条約。年号の順番に注意。", "hint": "ペリー来航の翌年。", "rabbit": "1853→1854、ここはセット！"}, {"year": "1854", "place": "下田・箱館", "flow": "和親条約", "q": "日米和親条約で開かれた港を2つあげよ。", "a": "下田・箱館", "o": ["下田・箱館", "神奈川・長崎", "横浜・長崎", "新潟・兵庫"], "memo": "日米和親条約で開港したのは下田・箱館。修好通商条約の港と混同注意。", "hint": "和親条約は下田と北の港。", "rabbit": "下田・箱館、まずこの2港！"}, {"year": "1854", "place": "開港地", "flow": "和親条約", "q": "日米和親条約にもとづき、開港地でアメリカ船に供給されたものは？", "a": "燃料・食料", "o": ["燃料・食料", "生糸・茶", "金銀・銅", "毛織物・綿織物"], "memo": "和親条約は貿易開始ではなく、船への補給が中心だった。", "hint": "船旅に必要なもの。", "rabbit": "船には燃料と食料がいる！"}, {"year": "1854", "place": "日米間", "flow": "和親条約", "q": "日米和親条約で、日本が第三国に恩恵的な条件を与えた場合、アメリカにも同様に認める待遇は？", "a": "片務的最恵国待遇", "o": ["片務的最恵国待遇", "領事裁判権", "関税自主権の欠如", "居留地"], "memo": "片務的最恵国待遇は日本に不利な条件の一つ。", "hint": "一方的に、よい条件をアメリカにも。", "rabbit": "いい条件はこっちにも…一方的！"}, {"year": "1854", "place": "日露間", "flow": "和親条約", "q": "日米和親条約締結後、プチャーチンと幕府の間で結ばれた条約は？", "a": "日露和親条約", "o": ["日露和親条約", "日米修好通商条約", "天津条約", "安政の五カ国条約"], "memo": "ロシアとは日露和親条約を結んだ。日米和親条約と同じ1854年。", "hint": "ロシアとの和親条約。", "rabbit": "ロシアとも和親！"}, {"year": "1854", "place": "日露間", "flow": "和親条約", "q": "日露和親条約は西暦何年に締結された？", "a": "1854年", "o": ["1854年", "1853年", "1858年", "1860年"], "memo": "日米和親条約と日露和親条約は、ともに1854年。", "hint": "日米和親条約と同じ年。", "rabbit": "1854年は和親条約の年！"}, {"year": "1854", "place": "長崎", "flow": "和親条約", "q": "日露和親条約で開かれた下田・箱館以外の港は？", "a": "長崎", "o": ["長崎", "横浜", "新潟", "兵庫"], "memo": "日露和親条約では、下田・箱館のほか長崎が開かれた。", "hint": "ロシア使節プチャーチンが来た港。", "rabbit": "長崎も忘れずに！"}, {"year": "1854", "place": "択捉島", "flow": "和親条約", "q": "日露和親条約で、現在の北方領土でもある日本領のうち、最も北の島は？", "a": "択捉島", "o": ["択捉島", "樺太（サハリン）", "淡路島", "対馬"], "memo": "日露和親条約では択捉島以南を日本領とした。", "hint": "北方領土の中で最も北。", "rabbit": "北の境界、択捉島！"}, {"year": "1854", "place": "樺太", "flow": "和親条約", "q": "日露和親条約で、従来通り境界を定めないとされたのはどこ？", "a": "樺太（サハリン）", "o": ["樺太（サハリン）", "択捉島", "箱館", "下田"], "memo": "樺太は境界を定めず、従来通りとされた。", "hint": "サハリンとも呼ばれる。", "rabbit": "線を引かない樺太！"}, {"year": "1853-1854", "place": "江戸湾", "flow": "幕府の対応", "q": "ペリー来航を機に、幕府が江戸湾防衛のために築いた砲台を何という？", "a": "台場", "o": ["台場", "居留地", "海防掛", "奉行所"], "memo": "台場は江戸湾を防衛するための砲台。現在のお台場の由来。", "hint": "大砲を置く場所。", "rabbit": "江戸湾に守りを固める！"}, {"year": "1853-1854", "place": "江戸", "flow": "幕府の対応", "q": "ペリー来航後、老中阿部正弘を中心に行われた台場建設や大船建造の禁の解除などの改革は？", "a": "安政の改革", "o": ["安政の改革", "寛政の改革", "天保の改革", "享保の改革"], "memo": "安政の改革では海防強化や人材登用が進められた。", "hint": "ペリー来航後の改革。", "rabbit": "幕府も立て直しに動く！"}, {"year": "1853-1854", "place": "江戸", "flow": "幕府の対応", "q": "安政の改革で幕政に参画した前水戸藩主は誰？ ementById('result').style.display='block';let pct=score/total;document.getElementById('final').textContent=`${score}/${total}`;document.getElementById('rank').textContent=pct==1?'Sランク':pct>=.8?'Aランク':pct>=.6?'Bランク':'Cランク';document.getElementById('advice').textContent=pct>=.8?'よくできています。アドバンスで理由まで確認しよう。':'トレーニングで時系列と場所をもう一度確認しよう。';document.getElementById('cert').classList.toggle('show',total===DATA.length&&score===total)}function backHome(){location.href='index.html'}</script></body></html>
