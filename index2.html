<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>アドバンストレーニング｜日本史</title>
<style>
:root{--bg:#f6efe7;--card:#fffdf9;--line:#e5cfbb;--ink:#2d2925;--accent:#b71c1c;--blue:#1d3557;--gold:#f6c04d;--pink:#ffe4ec}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#fff8ef,#efe4d6);color:var(--ink);overflow-x:hidden}
button{font:inherit}.app{max-width:1120px;margin:0 auto;padding:12px}
.card{background:rgba(255,253,249,.96);border:2px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 12px 28px rgba(0,0,0,.08)}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}.logoWrap{display:flex;align-items:center;gap:12px}.logo{width:56px;height:56px;object-fit:contain}.title{font-size:clamp(27px,4vw,44px);font-weight:900;line-height:1.05}.sub{font-size:14px;font-weight:700;color:#6c5f55}.menuBtn{border:none;border-radius:14px;padding:12px 16px;background:var(--blue);color:white;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #0d2035}
.hero{display:grid;grid-template-columns:1fr 320px;gap:14px;align-items:stretch}.info{background:#fff8ea;border:2px solid #ead6c3;border-radius:22px;padding:18px}.info h2{margin:0 0 10px;font-size:clamp(34px,5vw,58px);line-height:1.05}.info p{margin:0;line-height:1.7;font-size:clamp(16px,2vw,22px);font-weight:800;color:#5b5048}
.right{background:#fffaf4;border:2px dashed #e4cfbc;border-radius:22px;padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center}.rabbit{width:min(260px,70vw);object-fit:contain;filter:drop-shadow(0 10px 10px rgba(0,0,0,.12))}.speech{margin-top:12px;background:#fff8d8;border:3px solid #111;border-radius:18px;padding:14px;font-weight:900;line-height:1.5;text-align:center;box-shadow:4px 4px 0 #111}
.stage{margin-top:16px;display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.quiz,.panel{background:white;border:2px solid #ead6c3;border-radius:22px;padding:18px}.status{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}.badge{background:#f0e3d5;border-radius:999px;padding:8px 12px;font-weight:900}.type{display:inline-block;background:#fff0f0;color:#b71c1c;border:1px solid #efbaba;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:900;margin-bottom:8px}.question{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.45;margin-bottom:14px}.choices{display:grid;gap:10px}.choice{border:2px solid #d9c7b7;background:white;border-radius:18px;padding:14px;font-weight:900;font-size:18px;text-align:left;cursor:pointer;color:#1265a8;box-shadow:0 4px 0 #d0bba8}.choice.correct{background:#e7fff0;border-color:#14824d;color:#14824d}.choice.wrong{background:#fff0f0;border-color:#c62828;color:#c62828}
.panel h3{margin:0 0 10px;font-size:24px;color:#8a4b00}.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px}.compareBox{background:#fff8ea;border:2px solid #efcf9e;border-radius:16px;padding:12px}.compareBox b{display:block;font-size:18px;margin-bottom:6px}.gaugeBox{margin-top:12px}.gaugeLabel{font-weight:900;font-size:14px;margin:8px 0 4px}.gauge{height:18px;background:#eee2d4;border-radius:999px;overflow:hidden}.gauge span{display:block;height:100%;width:0%;background:linear-gradient(90deg,#f6c04d,#b71c1c);transition:.4s}
.explain{display:none;margin-top:14px;background:#fff8ea;border:2px solid #efcf9e;border-radius:18px;padding:14px;line-height:1.8;font-weight:800}.explain.show{display:block}.next{margin-top:14px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.next button,.result button{border:none;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer}.red{background:#b71c1c;color:white;box-shadow:0 5px 0 #7f1111}.blue{background:#1d3557;color:white;box-shadow:0 5px 0 #0d2035}.gold{background:#f6c04d;color:#2d2925;box-shadow:0 5px 0 #a87b00}
.result{display:none;margin-top:16px;background:white;border:2px solid #ead6c3;border-radius:22px;padding:20px;text-align:center}.result h2{font-size:clamp(36px,5vw,58px);margin:10px 0}.scoreBig{font-size:52px;font-weight:900;color:#b71c1c}
@media(max-width:850px){.hero,.stage{grid-template-columns:1fr}.compare{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><div class="card">
<div class="top"><div class="logoWrap"><img src="images/rabbit14.png" class="logo"><div><div class="title">アドバンストレーニング</div><div class="sub">比較・理由・因果関係で理解する</div></div></div><button class="menuBtn" onclick="location.href='index.html'">メニューへ</button></div>
<div class="hero"><div class="info"><h2>なぜ、<br>歴史は動いたのか。</h2><p>ここでは単語を答えるだけではなく、<br>「何と何が違うのか」「なぜ考えが変わったのか」まで確認します。</p></div><div class="right"><img id="rabbit" src="images/rabbit14.png" class="rabbit"><div id="speech" class="speech">「理由」がわかると、<br>歴史は忘れにくい！</div></div></div>
<div id="stage" class="stage"><div class="quiz"><div class="status"><div id="count" class="badge">1 / 8</div><div id="score" class="badge">正解 0</div></div><div id="type" class="type"></div><div id="question" class="question"></div><div id="choices" class="choices"></div><div id="explain" class="explain"></div><div class="next"><button class="blue" onclick="toggleExplain()">解説表示</button><button id="nextBtn" class="red" onclick="nextQ()" disabled>次へ</button></div></div>
<div class="panel"><h3>理解サポート</h3><div id="support"></div><div class="gaugeBox"><div class="gaugeLabel">幕府への不信・緊張</div><div class="gauge"><span id="gBakufu"></span></div><div class="gaugeLabel">攘夷の熱</div><div class="gauge"><span id="gJoi"></span></div><div class="gaugeLabel">現実路線・倒幕への変化</div><div class="gauge"><span id="gChange"></span></div></div></div></div>
<div id="result" class="result"><img src="images/rabbit01.png" class="rabbit" style="max-width:220px"><h2>アドバンス完了！</h2><div id="finalScore" class="scoreBig"></div><p style="font-size:22px;font-weight:800;line-height:1.7">次は通常クイズで、知識を一気に定着させよう。</p><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px"><button class="gold" onclick="location.href='index.html'">通常クイズへ</button><button class="blue" onclick="location.href='index2.html'">トレーニングへ</button></div></div>
</div></div>
<script>
const DATA=[
{type:'比較',q:'日米和親条約と日米修好通商条約の違いとして正しいものは？',a:'和親条約は補給中心、修好通商条約は貿易開始',o:['和親条約は補給中心、修好通商条約は貿易開始','和親条約は倒幕、修好通商条約は公武合体','和親条約は薩摩、修好通商条約は長州','和親条約は内戦、修好通商条約は米騒動'],support:'<div class="compare"><div class="compareBox"><b>日米和親条約</b>下田・箱館を開く。燃料・食料などの補給が中心。</div><div class="compareBox"><b>日米修好通商条約</b>本格的な貿易開始。不平等条約として重要。</div></div>',explain:'和親条約は「まず港を開いて補給」。修好通商条約は「貿易を始める」。ここを混同しないことが大切。',g:[25,20,10],rabbit:'rabbit10.png'},
{type:'因果',q:'日米修好通商条約の無勅許調印が、国内の反発を強めた理由は？',a:'朝廷の許可なしに幕府が条約を結んだから',o:['朝廷の許可なしに幕府が条約を結んだから','薩摩藩が幕府を助けたから','長州藩が開国を進めたから','ペリーが将軍になったから'],support:'<b>流れ</b><br>ハリスの圧力 → 勅許を得られない → 井伊直弼が調印 → 反対派が反発',explain:'幕府は朝廷の許可を得ないまま条約を結んだ。そのため、幕府への不信と尊王攘夷運動が強まった。',g:[55,45,15],rabbit:'rabbit11.png'},
{type:'原因→結果',q:'安政の大獄から桜田門外の変へつながった理由として正しいものは？',a:'井伊直弼が反対派を弾圧し、反発を招いたから',o:['井伊直弼が反対派を弾圧し、反発を招いたから','ペリーが水戸藩を攻撃したから','ハリスが将軍になったから','横浜の貿易が完全に止まったから'],support:'<b>因果</b><br>無勅許調印 → 反対派の批判 → 安政の大獄 → 水戸浪士らの反発 → 桜田門外の変',explain:'桜田門外の変は、単独で覚えるより「安政の大獄への反発」として覚えると流れが見える。',g:[70,70,20],rabbit:'rabbit09.png'},
{type:'比較',q:'一橋派と南紀派の違いとして正しいものは？',a:'一橋派は徳川慶喜、南紀派は徳川家茂を推した',o:['一橋派は徳川慶喜、南紀派は徳川家茂を推した','一橋派はペリー、南紀派はハリスを推した','一橋派は和親条約、南紀派は薩英戦争を推した','一橋派は長州、南紀派はイギリスを推した'],support:'<div class="compare"><div class="compareBox"><b>一橋派</b>徳川慶喜を推す。改革を期待。</div><div class="compareBox"><b>南紀派</b>徳川家茂を推す。井伊直弼が支持。</div></div>',explain:'将軍継嗣問題は、幕府内部の主導権争いでもあった。慶喜＝一橋派、家茂＝南紀派。',g:[60,45,25],rabbit:'rabbit13.png'},
{type:'変化理解',q:'薩摩藩が薩英戦争後に考え方を変えた理由として最も適切なものは？',a:'イギリスの軍事力の強さを実感したから',o:['イギリスの軍事力の強さを実感したから','幕府が薩摩を完全に守ったから','ペリーが薩摩藩主になったから','朝廷が貿易を禁止したから'],support:'<b>変化</b><br>攘夷を実行 → 薩英戦争 → 西洋軍事力を実感 → 現実路線へ',explain:'薩摩は「外国を追い払う」だけでは勝てないと知った。ここから西洋技術を学び、倒幕へ向かう力に変わっていく。',g:[55,60,65],rabbit:'rabbit15.png'},
{type:'変化理解',q:'長州藩が下関戦争後に方針転換していく理由として最も適切なものは？',a:'外国艦隊の力を知り、攘夷だけでは限界があると感じたから',o:['外国艦隊の力を知り、攘夷だけでは限界があると感じたから','幕府から完全に独立を認められたから','アメリカが長州藩を守ったから','貿易がすべて禁止されたから'],support:'<b>変化</b><br>外国船砲撃 → 下関戦争 → 敗北・衝撃 → 軍事改革と倒幕へ',explain:'長州も実戦を通して西洋の強さを知った。薩摩と同じく、攘夷から現実路線へ変化していく。',g:[60,65,70],rabbit:'rabbit12.png'},
{type:'因果',q:'薩長同盟が倒幕へ大きな意味を持った理由は？',a:'有力な薩摩藩と長州藩が協力するようになったから',o:['有力な薩摩藩と長州藩が協力するようになったから','幕府と朝廷が完全に統一されたから','ペリーとハリスが同盟したから','横浜の貿易が止まったから'],support:'<b>因果</b><br>薩摩と長州は対立 → 西洋の強さを知る → 倒幕の方向へ → 薩長同盟',explain:'薩摩と長州という有力藩が協力したことで、倒幕の力が一気に強まった。',g:[75,60,90],rabbit:'rabbit16.png'},
{type:'総合理解',q:'幕末の流れを最もよく表しているものは？',a:'外圧→開国→不平等条約→国内反発→攘夷→方針転換→倒幕',o:['外圧→開国→不平等条約→国内反発→攘夷→方針転換→倒幕','開国→鎖国→参勤交代→米騒動→倒幕','攘夷→平安遷都→鎌倉幕府→明治維新','貿易開始→鎖国強化→幕府安定→江戸幕府成立'],support:'<b>全体像</b><br>黒船の外圧が出発点。幕府の対応への不満が高まり、尊王攘夷から倒幕へ変化していく。',explain:'点で覚えた出来事を線にすると、幕末は「外圧によって幕府の権威が揺らぎ、諸藩が変化して倒幕へ向かう流れ」として見える。',g:[90,75,95],rabbit:'rabbit01.png'}
];
let idx=0,score=0,locked=false;
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function showQ(){locked=false;const item=DATA[idx];document.getElementById('count').textContent=`${idx+1} / ${DATA.length}`;document.getElementById('score').textContent=`正解 ${score}`;document.getElementById('type').textContent=item.type;document.getElementById('question').textContent=item.q;document.getElementById('support').innerHTML=item.support;document.getElementById('explain').classList.remove('show');document.getElementById('explain').innerHTML=item.explain;document.getElementById('nextBtn').disabled=true;document.getElementById('rabbit').src='images/'+item.rabbit;document.getElementById('speech').innerHTML='理由を考えよう！';document.getElementById('gBakufu').style.width=item.g[0]+'%';document.getElementById('gJoi').style.width=item.g[1]+'%';document.getElementById('gChange').style.width=item.g[2]+'%';const box=document.getElementById('choices');box.innerHTML='';shuffle(item.o).forEach(opt=>{const b=document.createElement('button');b.className='choice';b.textContent=opt;b.onclick=()=>answer(b,opt,item);box.appendChild(b)})}
function answer(btn,opt,item){if(locked)return;locked=true;document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===item.a)b.classList.add('correct')});if(opt===item.a){score++;document.getElementById('speech').innerHTML='理解できてる！';document.getElementById('rabbit').src='images/rabbit16.png'}else{btn.classList.add('wrong');document.getElementById('speech').innerHTML='ここが理解ポイント！';document.getElementById('rabbit').src='images/rabbit09.png'}document.getElementById('score').textContent=`正解 ${score}`;document.getElementById('explain').classList.add('show');document.getElementById('nextBtn').disabled=false}
function nextQ(){idx++;if(idx>=DATA.length){finish();return}showQ()}
function toggleExplain(){document.getElementById('explain').classList.toggle('show')}
function finish(){document.getElementById('stage').style.display='none';document.getElementById('result').style.display='block';document.getElementById('finalScore').textContent=`${score}/${DATA.length}`}
showQ();
</script>
</body>
</html>
