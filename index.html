let quiz=[],idx=0,points=0,locked=false,mistakes=[],lastN=10,streak=0;
const RABBITS={ready:['rabbit15.png','rabbit03.png','rabbit05.png'],ok:['rabbit07.png','rabbit10.png','rabbit14.png','rabbit16.png'],ng:['rabbit09.png','rabbit11.png','rabbit12.png'],great:['rabbit06.png','rabbit08.png','rabbit13.png'],finish:['rabbit01.png','rabbit07.png','rabbit10.png']};
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function setRabbit(kind,msg,target='rabbit'){const el=document.getElementById(target); if(!el)return; el.src='images/'+pick(RABBITS[kind]||RABBITS.ready); el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); const m=document.getElementById(target+'Msg')||document.getElementById('rabbitMsg'); if(m)m.textContent=msg||'';}
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function startGame(n){lastN=n;quiz=shuffle(DATA).slice(0,n);idx=0;points=0;mistakes=[];streak=0;document.getElementById('menu').style.display='none';document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';showQ()}
function showQ(){locked=false;setRabbit('ready','えらべ！');const item=quiz[idx];document.getElementById('count').textContent=`${idx+1} / ${quiz.length}`;document.getElementById('score').textContent=`正解 ${points}`;document.getElementById('bar').style.width=`${(idx/quiz.length)*100}%`;document.getElementById('section').textContent=item.s;document.getElementById('question').textContent=item.q;document.getElementById('feedback').textContent='';document.getElementById('feedback').className='feedback';document.getElementById('answer').style.display='none';document.getElementById('answer').textContent='';document.getElementById('nextBtn').disabled=true;const box=document.getElementById('choices');box.innerHTML='';shuffle(item.o).forEach(opt=>{const b=document.createElement('button');b.className='choice';b.textContent=opt;b.onclick=()=>choose(b,opt,item);box.appendChild(b)})}
function choose(btn,opt,item){if(locked)return;locked=true;const buttons=[...document.querySelectorAll('.choice')];buttons.forEach(b=>{if(b.textContent===item.a)b.classList.add('correct')});if(opt===item.a){points++;streak++;document.getElementById('feedback').textContent=streak>=3?'連続正解！':'正解！';document.getElementById('feedback').classList.add('ok');setRabbit(streak>=3?'great':'ok',streak>=3?'キラーン！':'オーッ!!');beep(880,0.08);setTimeout(()=>beep(1320,0.08),90)}else{streak=0;btn.classList.add('wrong');mistakes.push(item);document.getElementById('feedback').textContent='惜しい！';document.getElementById('feedback').classList.add('ng');document.getElementById('answer').innerHTML='正解：<b>'+item.a+'</b>';document.getElementById('answer').style.display='block';setRabbit('ng','うーん…');beep(220,0.12);setTimeout(()=>beep(165,0.12),100)}document.getElementById('score').textContent=`正解 ${points}`;document.getElementById('nextBtn').disabled=false;document.getElementById('bar').style.width=`${((idx+1)/quiz.length)*100}%`}
function nextQ(){idx++; if(idx>=quiz.length){finish()}else{showQ()}}
function finish(){document.getElementById('game').style.display='none';document.getElementById('result').style.display='block';const pct=Math.round(points/quiz.length*100);document.getElementById('finalScore').textContent=`${points}/${quiz.length}`;setRabbit(pct>=80?'finish':'ng',pct===100?'満点！':pct>=80?'すごい！':'復習しよう！','resultRabbit');document.getElementById('finalMsg').textContent=pct===100?'満点！幕末マスターです。':pct>=80?'かなり仕上がっています。間違いだけ復習しよう。':pct>=60?'あと少し。人物・条約・年号を整理しよう。':'まずは赤字答えをテンポよく反復しよう。';document.getElementById('reviewBtn').style.display=mistakes.length?'inline-block':'none';const m=document.getElementById('mistakes');m.innerHTML='';mistakes.forEach(x=>{const d=document.createElement('div');d.className='mistake';d.innerHTML='<b>'+x.a+'</b><br><span class="small">'+x.q+'</span>';m.appendChild(d)})}
function reviewMistakes(){if(!mistakes.length)return;quiz=shuffle(mistakes);idx=0;points=0;streak=0;mistakes=[];document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';showQ()}
function backMenu(){document.getElementById('game').style.display='none';document.getElementById('result').style.display='none';document.getElementById('menu').style.display='grid'}
function beep(freq,dur){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.frequency.value=freq;o.type='square';g.gain.setValueAtTime(.06,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch(e){}}
</script></body></html>
