<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>日本史クイズ｜開国と幕末の動乱 暗記サポート版</title>
<style>
:root{--bg:#f7f0e8;--card:#fffdf9;--ink:#2b2723;--accent:#b71c1c;--accent2:#1d3557;--ok:#14824d;--ng:#c62828;--soft:#ead8c8;--gold:#f4b400;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#fff7ed,#f5efe7 55%,#ead9cb);color:var(--ink);min-height:100vh;touch-action:manipulation;}
.app{max-width:1040px;margin:0 auto;padding:16px;}
header{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:10px;}
.title{font-size:clamp(22px,4vw,36px);font-weight:900;letter-spacing:.02em;line-height:1.1}
.badge{background:var(--accent);color:#fff;border-radius:999px;padding:8px 12px;font-weight:900;font-size:14px;white-space:nowrap}
.panel{background:rgba(255,253,249,.94);border:2px solid var(--soft);box-shadow:0 12px 28px rgba(80,50,25,.14);border-radius:24px;padding:16px;}
.menuGrid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:center}
.rabbitWrap{position:relative;display:flex;align-items:center;justify-content:center;min-height:210px}
.rabbit{max-width:min(260px,46vw);height:auto;filter:drop-shadow(0 10px 10px rgba(0,0,0,.12));}
.rabbit.pop{animation:pop .28s ease-out} @keyframes pop{0%{transform:scale(.92) rotate(-2deg)}70%{transform:scale(1.08) rotate(2deg)}100%{transform:scale(1)}}
.bubble{position:absolute;right:4px;top:12px;background:#fff;border:3px solid #111;border-radius:18px;padding:10px 12px;font-weight:900;box-shadow:4px 4px 0 #111;max-width:210px}
button{font:inherit}
.btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.mainBtn{border:0;border-radius:16px;padding:13px 16px;background:var(--accent2);color:white;font-weight:900;box-shadow:0 5px 0 #0b2036;min-width:120px}
.mainBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #0b2036}
.subBtn{border:2px solid var(--accent2);border-radius:14px;padding:10px 12px;background:#fff;color:var(--accent2);font-weight:900}
.small{font-size:13px;color:#685a50;line-height:1.55}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.progress{height:12px;background:#ead8c8;border-radius:999px;overflow:hidden;flex:1}
.bar{height:100%;background:linear-gradient(90deg,#c62828,#f4b400);width:0%;transition:.25s}
.meta{font-weight:900;color:#5a4638;white-space:nowrap}
.questionBox{display:grid;grid-template-columns:1fr 250px;gap:14px;align-items:stretch}
.qMain{background:#fff;border:2px solid #ead8c8;border-radius:22px;padding:16px;}
.section{display:inline-block;background:#fff0f0;color:var(--accent);border:1px solid #f2c5c5;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:900;margin-bottom:8px}
.typeTag{display:inline-block;background:#eef4ff;color:#1d3557;border:1px solid #cbd9ef;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:900;margin-left:6px}
.question{font-size:clamp(19px,3.2vw,30px);font-weight:900;line-height:1.45;margin:8px 0 12px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{text-align:left;border:2px solid #d9c8ba;background:#fff;border-radius:16px;padding:13px 14px;font-weight:900;line-height:1.3;min-height:54px;box-shadow:0 4px 0 #d2bfae}
.choice.correct{background:#e8fff2;border-color:var(--ok);color:var(--ok)} .choice.wrong{background:#fff0f0;border-color:var(--ng);color:var(--ng)}
.side{display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;background:#fffaf4;border:2px dashed #e5cdb9;border-radius:22px;padding:10px;position:relative}
.side .rabbit{max-width:190px}
.feedback{font-size:24px;font-weight:900;text-align:center;min-height:34px} .ok{color:var(--ok)} .ng{color:var(--ng)}
.learnBox{display:none;margin-top:12px;border-radius:18px;border:2px solid #f1d0a4;background:#fff8e8;padding:12px;line-height:1.65}
.learnBox.show{display:block;animation:fade .25s ease-out} @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.learnTitle{font-weight:900;color:#8a4b00;margin-bottom:4px}
.answer{font-weight:900;color:#111;margin-bottom:4px}
.memory{font-weight:800}
.explain{color:#4f4238}
.flow{margin-top:10px;padding:10px;background:#fff;border:1px solid #ead8c8;border-radius:14px}
.flowTitle{font-weight:900;font-size:13px;color:#73523e;margin-bottom:6px}
.flowItems{display:flex;flex-wrap:wrap;gap:6px}
.flowItem{font-size:12px;padding:5px 8px;border-radius:999px;background:#f1e5da;color:#6b5a4d;font-weight:800}
.flowItem.active{background:var(--accent);color:#fff}
.nextRow{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:12px}
.nextBtn{border:0;border-radius:16px;padding:13px 18px;background:var(--accent);color:#fff;font-weight:900;box-shadow:0 5px 0 #7f1111;min-width:140px}
.nextBtn:disabled{opacity:.45}
.resultBox{text-align:center}
.scoreBig{font-size:56px;font-weight:900;color:var(--accent);line-height:1}
.mistakes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;text-align:left}
.mistake{background:#fff;border:1px solid #ead8c8;border-radius:14px;padding:10px}
.switchRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.switch{font-size:13px;font-weight:900;background:#fff;border:2px solid #e1c7ad;border-radius:999px;padding:8px 10px}
.switch input{vertical-align:middle}
@media(max-width:760px){.menuGrid,.questionBox{grid-template-columns:1fr}.choices{grid-template-columns:1fr}.side{min-height:130px;flex-direction:row}.side .rabbit{max-width:120px}.bubble{position:static;box-shadow:3px 3px 0 #111}.mistakes{grid-template-columns:1fr}header{align-items:flex-start}}
@media(max-height:760px) and (orientation:landscape){.app{padding:10px}.panel{padding:12px;border-radius:18px}.question{font-size:22px;margin:4px 0 8px}.choice{min-height:46px;padding:10px 12px}.side .rabbit{max-width:140px}.learnBox{line-height:1.45;padding:9px}}
</style>
</head>
<body>
<div class="app">
<header><div><div class="title">日本史クイズ 暗記サポート版</div><div class="small">開国と幕末の動乱｜選択肢＋語呂・背景・流れで覚える</div></div><div class="badge">GitHub Pages対応</div></header>
<section id="menu" class="panel">
  <div class="menuGrid">
    <div>
      <h2>右の答えを選ぶだけでは終わらない</h2>
      <p>答えたあとに、<b>覚え方</b>・<b>背景</b>・<b>歴史の流れ</b>が出ます。間違えた問題だけ復習もできます。</p>
      <div class="switchRow">
        <label class="switch"><input id="autoLearn" type="checkbox" checked> 解答後に暗記カードを表示</label>
        <label class="switch"><input id="soundOn" type="checkbox" checked> 効果音</label>
      </div>
      <div class="btns">
        <button class="mainBtn" onclick="startGame(10)">10問</button>
        <button class="mainBtn" onclick="startGame(20)">20問</button>
        <button class="mainBtn" onclick="startGame(DATA.length)">全問</button>
      </div>
      <p class="small">今回の範囲：ペリー来航と対外方針の模索／開港とその影響／公武合体と尊攘運動の入口</p>
    </div>
    <div class="rabbitWrap"><img id="rabbit" class="rabbit" src="images/rabbit15.png"><div id="rabbitMsg" class="bubble">さあ、覚えるぞ！</div></div>
  </div>
</section>
<section id="game" class="panel" style="display:none">
  <div class="topbar"><div class="meta" id="count"></div><div class="progress"><div id="bar" class="bar"></div></div><div class="meta" id="score"></div></div>
  <div class="questionBox">
    <div class="qMain">
      <div><span id="section" class="section"></span><span id="typeTag" class="typeTag"></span></div>
      <div id="question" class="question"></div>
      <div id="choices" class="choices"></div>
      <div id="learnBox" class="learnBox">
        <div class="learnTitle">暗記カード</div>
        <div id="answer" class="answer"></div>
        <div id="memory" class="memory"></div>
        <div id="explain" class="explain"></div>
        <div class="flow"><div class="flowTitle">今どの流れ？</div><div id="flowItems" class="flowItems"></div></div>
      </div>
      <div class="nextRow"><button class="subBtn" onclick="toggleLearn()">暗記カード表示/非表示</button><button id="nextBtn" class="nextBtn" onclick="nextQ()" disabled>次へ</button></div>
    </div>
    <div class="side"><img id="gameRabbit" class="rabbit" src="images/rabbit03.png"><div><div id="feedback" class="feedback"></div><div id="gameRabbitMsg" class="bubble">選んで！</div></div></div>
  </div>
</section>
<section id="result" class="panel resultBox" style="display:none">
  <img id="resultRabbit" class="rabbit" src="images/rabbit01.png"><div id="resultRabbitMsg" class="bubble" style="position:static;display:inline-block;margin:8px auto">結果！</div>
  <div class="scoreBig" id="finalScore"></div><h2 id="finalMsg"></h2>
  <div class="btns" style="justify-content:center"><button class="mainBtn" onclick="startGame(lastN)">もう一回</button><button class="mainBtn" onclick="startGame(DATA.length)">全問</button><button id="reviewBtn" class="mainBtn" onclick="reviewMistakes()">間違い復習</button><button class="subBtn" onclick="backMenu()">メニュー</button></div>
  <div id="weakMsg" class="small"></div><div id="mistakes" class="mistakes"></div>
</section>
</div>
<script>
const DATA = [{"s": "ペリー来航と対外方針の模索", "q": "幕府が異国船打払令を緩和して出した法令を何というか。", "a": "天保の薪水給与令", "o": ["天保の薪水給与令", "異国船打払令", "五品江戸廻送令", "万延小判"], "memory": "薪水＝水と燃料。打ち払うより「水と燃料を与えて帰す」方針へ転換。", "explain": "アヘン戦争後、外国船を無理に追い払う危険を幕府が意識した。", "id": 1, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "天保の薪水給与令は西暦何年に発令されたか。", "a": "1842年", "o": ["1842年", "1853年", "1854年", "1858年"], "memory": "「いやよに(1842)なった打払令」→薪水給与へ。", "explain": "アヘン戦争で清が敗れ、日本も対外政策の見直しを迫られた。", "id": 2, "type": "年号"}, {"s": "ペリー来航と対外方針の模索", "q": "天保の薪水給与令の発令の要因となった、中国での戦争を何というか。", "a": "アヘン戦争", "o": ["アヘン戦争", "第2次アヘン戦争", "アロー戦争", "クリミア戦争"], "memory": "清がイギリスに敗れた衝撃。日本の海防意識が一気に高まった。", "explain": "中国の敗北は、幕府にとって「次は日本かもしれない」という警告になった。", "id": 3, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "アヘン戦争で敗れた清とイギリスが結んだ条約を何というか。", "a": "南京条約", "o": ["南京条約", "天津条約", "北京条約", "日米和親条約"], "memory": "アヘン戦争の結果＝南京条約。清が不平等条約を結ばされた。", "explain": "この経験が日本の開国交渉にも大きな影響を与えた。", "id": 4, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "1844年、国王が12代将軍徳川家慶に親書をもたらし、開国を勧めた国はどこか。", "a": "オランダ", "o": ["オランダ", "ロシア", "アメリカ", "イギリス"], "memory": "鎖国下でも関係が続いた西洋国＝オランダ。だから国王の親書も届いた。", "explain": "1844年、オランダ国王は開国を勧めたが、幕府は本格的には動かなかった。", "id": 5, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "1845年、幕府が対外政策について検討するために設置した役職を何というか。", "a": "海防掛", "o": ["海防掛", "総領事", "老中首座", "外国奉行"], "memory": "海を防ぐ担当＝海防掛。そのまま覚える。", "explain": "幕府が対外危機を専門的に検討し始めたことを示す役職。", "id": 6, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "1846年に浦賀に来航し、開国を求めたアメリカ東インド艦隊司令長官は誰か。", "a": "ビッドル", "o": ["ビッドル", "ペリー", "ハリス", "プチャーチン"], "memory": "ペリーの前に来た人＝ビッドル。ペリーほど強くは迫れなかった。", "explain": "1846年に浦賀へ来航し、開国を求めた。", "id": 7, "type": "人物"}, {"s": "ペリー来航と対外方針の模索", "q": "日本を開国させた、アメリカ東インド艦隊司令長官は誰か。", "a": "ペリー", "o": ["ペリー", "ビッドル", "ハリス", "プチャーチン"], "memory": "黒船＝ペリー。1853年、浦賀に来航。", "explain": "軍事力を背景に国書を受理させ、日本開国の直接のきっかけを作った。", "id": 8, "type": "人物"}, {"s": "ペリー来航と対外方針の模索", "q": "ペリーが軍艦4隻を率いて日本に来航したのは西暦何年か。", "a": "1853年", "o": ["1853年", "1854年", "1856年", "1858年"], "memory": "「いやこみ(1853)入る黒船来航」", "explain": "ペリー来航の年。幕末の流れの出発点として重要。", "id": 9, "type": "年号"}, {"s": "ペリー来航と対外方針の模索", "q": "ペリーは1853年6月に日本のどこに来航したか。", "a": "浦賀", "o": ["浦賀", "下田", "長崎", "横浜"], "memory": "黒船が最初に来た場所＝浦賀。", "explain": "江戸湾入口に近く、幕府に強い緊張を与えた。", "id": 10, "type": "地名"}, {"s": "ペリー来航と対外方針の模索", "q": "ペリーがアメリカ大統領の国書を幕府に受理させたが、この時の大統領名をあげよ。", "a": "フィルモア", "o": ["フィルモア", "リンカン", "ヒュースケン", "ハリス"], "memory": "ペリーが持ってきた国書の大統領＝フィルモア。", "explain": "アメリカは捕鯨船の補給地確保や太平洋進出をねらっていた。", "id": 11, "type": "人物"}, {"s": "ペリー来航と対外方針の模索", "q": "ペリーが来航した時の、幕府の老中首座は誰か。", "a": "阿部正弘", "o": ["阿部正弘", "堀田正睦", "井伊直弼", "徳川斉昭"], "memory": "ペリー来航時の老中首座＝阿部正弘。", "explain": "大名や朝廷にも意見を求め、幕府政治のあり方を変えるきっかけになった。", "id": 12, "type": "人物"}, {"s": "ペリー来航と対外方針の模索", "q": "ペリーに続いて来日し、開国を要求したロシアの使節は誰か。", "a": "プチャーチン", "o": ["プチャーチン", "ペリー", "ハリス", "ビッドル"], "memory": "ロシアの使節＝プチャーチン。ペリーとセットで覚える。", "explain": "ロシアも日本との通商・国境交渉を求めて来航した。", "id": 13, "type": "人物"}, {"s": "ペリー来航と対外方針の模索", "q": "1853年にプチャーチンはどこに来航したか。", "a": "長崎", "o": ["長崎", "浦賀", "下田", "横浜"], "memory": "プチャーチンは長崎。ペリーは浦賀。", "explain": "長崎は江戸時代を通じて対外窓口として重要だった。", "id": 14, "type": "地名"}, {"s": "ペリー来航と対外方針の模索", "q": "1854年にペリーが再来日し、江戸幕府と締結した条約を何というか。", "a": "日米和親条約（神奈川条約）", "o": ["日米和親条約（神奈川条約）", "日米修好通商条約", "日露和親条約", "安政の五カ国条約"], "memory": "和親＝まずは「仲よく・補給」。通商ではない。", "explain": "1854年、下田・箱館を開き、燃料や食料の供給を認めた。", "id": 15, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "日米和親条約が締結されたのは西暦何年か。", "a": "1854年", "o": ["1854年", "1853年", "1858年", "1860年"], "memory": "「いやごよ(1854)、和親条約」", "explain": "ペリー再来航の年。日米和親条約・日露和親条約を押さえる。", "id": 16, "type": "年号"}, {"s": "ペリー来航と対外方針の模索", "q": "日米和親条約はどこで締結されたか。当時の宿駅名をあげよ。", "a": "神奈川", "o": ["神奈川", "下田", "箱館", "横浜"], "memory": "条約名は神奈川条約。当時の宿駅名として覚える。", "explain": "日米和親条約は神奈川で締結された。", "id": 17, "type": "地名"}, {"s": "ペリー来航と対外方針の模索", "q": "日米和親条約で開かれた港を2つあげよ。", "a": "下田・箱館", "o": ["下田・箱館", "神奈川・長崎", "新潟・兵庫", "横浜・長崎"], "memory": "和親条約で開いた港＝下田・箱館。まずこの2つ。", "explain": "通商ではなく、補給と寄港のための開港だった。", "id": 18, "type": "地名"}, {"s": "ペリー来航と対外方針の模索", "q": "日米和親条約にもとづき、開港地でアメリカ船に供給されたものをあげよ。", "a": "燃料・食料", "o": ["燃料・食料", "生糸・茶", "毛織物・綿織物", "雑穀・蠟"], "memory": "薪水＝燃料と水、さらに食料。船の補給が目的。", "explain": "アメリカ捕鯨船などが太平洋で活動するために補給地が必要だった。", "id": 19, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "日米和親条約で日本が、より恩恵的な条件を第三国に与えた場合、アメリカにも同様にすることを認めた待遇を何というか。", "a": "片務的最恵国待遇", "o": ["片務的最恵国待遇", "領事裁判権", "協定関税", "関税自主権"], "memory": "片務＝一方だけ。アメリカだけが有利になりやすい待遇。", "explain": "日本が他国に有利な条件を与えたら、アメリカにも自動的に認める内容。", "id": 20, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "日米和親条約締結後、プチャーチンと幕府との間で締結された条約を何というか。", "a": "日露和親条約", "o": ["日露和親条約", "日米和親条約", "日米修好通商条約", "安政の五カ国条約"], "memory": "ロシアとは日露和親条約。プチャーチンとセット。", "explain": "日米和親条約後、日本はロシアとも条約を結んだ。", "id": 21, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "日露和親条約は西暦何年に締結されたか。", "a": "1854年", "o": ["1854年", "1853年", "1858年", "1863年"], "memory": "「いやごよ(1854)、和親条約」", "explain": "ペリー再来航の年。日米和親条約・日露和親条約を押さえる。", "id": 22, "type": "年号"}, {"s": "ペリー来航と対外方針の模索", "q": "日露和親条約で開かれた、下田・箱館以外の港をあげよ。", "a": "長崎", "o": ["長崎", "横浜", "新潟", "兵庫"], "memory": "プチャーチンは長崎。ペリーは浦賀。", "explain": "長崎は江戸時代を通じて対外窓口として重要だった。", "id": 23, "type": "地名"}, {"s": "ペリー来航と対外方針の模索", "q": "日露和親条約では国境についても取り決めがなされたが、現在の北方領土でもある日本領のうち、最も北の島は何か。", "a": "択捉島", "o": ["択捉島", "国後島", "色丹島", "歯舞群島"], "memory": "北方四島の中で最も北＝択捉島。", "explain": "日露和親条約で、択捉島以南を日本領とした。", "id": 24, "type": "地名"}, {"s": "ペリー来航と対外方針の模索", "q": "日露和親条約で、従来通り境界を定めないとされたのはどこか。", "a": "樺太（サハリン）", "o": ["樺太（サハリン）", "択捉島", "下田", "神奈川"], "memory": "樺太は境界を決めない。ここはひっかけ注意。", "explain": "日露和親条約では樺太の国境は未確定とされた。", "id": 25, "type": "地名"}, {"s": "ペリー来航と対外方針の模索", "q": "アメリカ・ロシア以外に和親条約を結んだ国を2つあげよ。", "a": "イギリス・オランダ", "o": ["イギリス・オランダ", "フランス・ロシア", "清・イギリス", "オランダ・ロシア"], "memory": "米・露以外の和親条約＝英・蘭。", "explain": "開国の流れはアメリカだけでなく各国へ広がった。", "id": 26, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "ペリー来航を機に、幕府が江戸湾防衛のために築いた砲台を何というか。", "a": "台場", "o": ["台場", "居留地", "海防掛", "五稜郭"], "memory": "お台場の台場。江戸湾防衛の砲台。", "explain": "ペリー来航後、幕府は江戸湾防衛を急いだ。", "id": 27, "type": "用語"}, {"s": "ペリー来航と対外方針の模索", "q": "ペリー来航後、老中阿部正弘を中心に行われた、台場の建設や大船建造の禁の解除など一連の改革を何というか。", "a": "安政の改革", "o": ["安政の改革", "天保の改革", "享保の改革", "寛政の改革"], "memory": "安政期に阿部正弘が進めた改革。大船建造の禁解除もセット。", "explain": "外圧に対応するため、幕府の軍事・政治体制を立て直そうとした。", "id": 28, "type": "人物"}, {"s": "ペリー来航と対外方針の模索", "q": "安政の改革で幕政に参画した前水戸藩主は誰か。", "a": "徳川斉昭", "o": ["徳川斉昭", "徳川家慶", "徳川家定", "徳川慶喜"], "memory": "水戸の斉昭。攘夷論・海防論で存在感。", "explain": "安政の改革で幕政に参加し、後の一橋派にも関わる。", "id": 29, "type": "人物"}, {"s": "開港とその影響", "q": "1856年にイギリス船が広東港で清の官憲に臨検を受けたことを口実に、翌年、イギリス・フランスの軍隊が天津に侵入した事件を何というか。", "a": "第2次アヘン戦争（アロー戦争）", "o": ["第2次アヘン戦争（アロー戦争）", "アヘン戦争", "東禅寺事件", "生麦事件"], "memory": "アロー号事件から第2次アヘン戦争。", "explain": "清が再び欧米に圧迫され、日本にも通商条約締結の圧力が強まった。", "id": 30, "type": "年号"}, {"s": "開港とその影響", "q": "第2次アヘン戦争で劣勢になった清が、イギリス・フランス・ロシア・アメリカの4カ国と結んだ条約を何というか。", "a": "天津条約", "o": ["天津条約", "南京条約", "日米修好通商条約", "安政の五カ国条約"], "memory": "第2次アヘン戦争の途中で結ばれた条約＝天津条約。", "explain": "ハリスはこれを利用して、日本にも通商条約を迫った。", "id": 31, "type": "用語"}, {"s": "開港とその影響", "q": "日米和親条約の規定により、アメリカから日本に着任したのは誰か。", "a": "ハリス", "o": ["ハリス", "ペリー", "ビッドル", "ヒュースケン"], "memory": "ペリーは軍艦、ハリスは総領事。", "explain": "日米修好通商条約の締結を幕府に迫った人物。", "id": 32, "type": "人物"}, {"s": "開港とその影響", "q": "江戸時代末期に来日したハリスの役職は何か。", "a": "総領事", "o": ["総領事", "東インド艦隊司令長官", "老中首座", "大老"], "memory": "ハリスの役職＝総領事。", "explain": "下田に着任し、幕府と通商条約交渉を進めた。", "id": 33, "type": "用語"}, {"s": "開港とその影響", "q": "ハリスは西暦何年に来日したか。", "a": "1856年", "o": ["1856年", "1853年", "1854年", "1858年"], "memory": "「いやごろ(1856)ハリス来日」", "explain": "ハリスが下田に着任した年。", "id": 34, "type": "年号"}, {"s": "開港とその影響", "q": "ハリスが最初に着任したのはどこか。", "a": "下田", "o": ["下田", "横浜", "長崎", "浦賀"], "memory": "ハリスの最初の着任地＝下田。", "explain": "日米和親条約で開かれた港の一つ。", "id": 35, "type": "地名"}, {"s": "開港とその影響", "q": "ハリスが着任した当時、老中首座として外交事務にあたっていた人物は誰か。", "a": "堀田正睦", "o": ["堀田正睦", "阿部正弘", "井伊直弼", "徳川斉昭"], "memory": "ハリス交渉時の老中首座＝堀田正睦。", "explain": "朝廷から勅許を得ようとしたが失敗した。", "id": 36, "type": "人物"}, {"s": "開港とその影響", "q": "第2次アヘン戦争で天津条約が結ばれたことを利用して、ハリスが新たな条約の調印を幕府に迫った。この条約を何というか。", "a": "日米修好通商条約", "o": ["日米修好通商条約", "日米和親条約", "日露和親条約", "天津条約"], "memory": "修好通商＝本格的に貿易開始。和親条約と区別。", "explain": "1858年、勅許なしで調印された不平等条約。", "id": 37, "type": "用語"}, {"s": "開港とその影響", "q": "日米修好通商条約は西暦何年に締結されたか。", "a": "1858年", "o": ["1858年", "1854年", "1856年", "1860年"], "memory": "「いやごや(1858)で通商開始の条約」", "explain": "日米修好通商条約の年。", "id": 38, "type": "年号"}, {"s": "開港とその影響", "q": "日米修好通商条約は勅許を得られないまま調印されたが、これを指示した大老は誰か。", "a": "井伊直弼", "o": ["井伊直弼", "阿部正弘", "堀田正睦", "徳川慶喜"], "memory": "勅許なし調印・安政の大獄・桜田門外の変は井伊直弼。", "explain": "大老として強権的に条約調印と反対派弾圧を進めた。", "id": 39, "type": "人物"}, {"s": "開港とその影響", "q": "日米修好通商条約の調印に際して勅許を与えなかった天皇は誰か。", "a": "孝明天皇", "o": ["孝明天皇", "明治天皇", "後水尾天皇", "光格天皇"], "memory": "開国に慎重だった天皇＝孝明天皇。", "explain": "勅許を出さず、幕府と朝廷の対立が深まった。", "id": 40, "type": "人物"}, {"s": "開港とその影響", "q": "日米修好通商条約で、幕府は和親条約の開港地のほかに4港を開くことと、江戸・大坂の開市を約束したが、翌1859年に開港することを約束した土地を2つあげよ。", "a": "神奈川・長崎", "o": ["神奈川・長崎", "下田・箱館", "新潟・兵庫", "横浜・下田"], "memory": "1859年開港予定＝神奈川・長崎。神奈川は実際には横浜へ。", "explain": "修好通商条約で追加開港が決まった。", "id": 41, "type": "地名"}, {"s": "開港とその影響", "q": "日米修好通商条約の開港地のうち、神奈川は混乱を避けるために近接した漁村が開港された。それはどこか。", "a": "横浜", "o": ["横浜", "下田", "箱館", "長崎"], "memory": "神奈川の代わりに開港された漁村＝横浜。のち貿易の中心へ。", "explain": "外国人との接触を管理しやすい場所として選ばれた。", "id": 42, "type": "地名"}, {"s": "開港とその影響", "q": "横浜が開港されたため、半年後に閉鎖された港はどこか。", "a": "下田", "o": ["下田", "長崎", "箱館", "浦賀"], "memory": "ハリスの最初の着任地＝下田。", "explain": "日米和親条約で開かれた港の一つ。", "id": 43, "type": "地名"}, {"s": "開港とその影響", "q": "日米修好通商条約で、1860年と1863年に開港を約した港をそれぞれあげよ。", "a": "新潟・兵庫", "o": ["新潟・兵庫", "神奈川・長崎", "下田・箱館", "横浜・長崎"], "memory": "後に開港予定＝新潟・兵庫。年号問題とセット。", "explain": "修好通商条約で段階的な開港が約束された。", "id": 44, "type": "地名"}, {"s": "開港とその影響", "q": "修好通商条約はアメリカについて、オランダ・ロシア・イギリス・フランスとも締結された。これらを総称して何というか。", "a": "安政の五カ国条約", "o": ["安政の五カ国条約", "日米修好通商条約", "片務的最恵国待遇", "五品江戸廻送令"], "memory": "米・蘭・露・英・仏との通商条約をまとめて安政の五カ国条約。", "explain": "日本に不利な条件を含む不平等条約だった。", "id": 45, "type": "用語"}, {"s": "開港とその影響", "q": "安政の五カ国条約は、日本にとって不利な不平等条約だが、不平等な点を2つあげよ。", "a": "領事裁判権を認めたこと・関税自主権の欠如", "o": ["領事裁判権を認めたこと・関税自主権の欠如", "鎖国の継続・大船建造の禁止", "参勤交代の強化・開港地の閉鎖", "攘夷の実行・勅許の獲得"], "memory": "不平等条約の2大ポイント＝裁判権と関税。", "explain": "外国人を日本で裁けず、関税も自由に決められなかった。", "id": 46, "type": "用語"}, {"s": "開港とその影響", "q": "安政の五カ国条約の関税について定めた規定を何というか。", "a": "貿易章程", "o": ["貿易章程", "五品江戸廻送令", "万延小判", "薪水給与令"], "memory": "貿易のルール＝貿易章程。", "explain": "関税率など、通商に関する規定を定めた。", "id": 47, "type": "用語"}, {"s": "開港とその影響", "q": "安政の五カ国条約により、開港地に外国人が居住し貿易を許された地域を何というか。", "a": "居留地", "o": ["居留地", "台場", "宿駅", "藩邸"], "memory": "外国人が住み、貿易する場所＝居留地。", "explain": "開港地に設けられ、日本人との接触は一定程度制限された。", "id": 48, "type": "用語"}, {"s": "開港とその影響", "q": "幕末、修好通商条約の締結による貿易は、西暦何年から開始されたか。", "a": "1859年", "o": ["1859年", "1854年", "1858年", "1860年"], "memory": "「いやごく(1859)、貿易開始」", "explain": "修好通商条約にもとづく貿易開始の年。", "id": 49, "type": "年号"}, {"s": "開港とその影響", "q": "幕末に、貿易の中心地になった開港地はどこか。", "a": "横浜", "o": ["横浜", "長崎", "下田", "箱館"], "memory": "神奈川の代わりに開港された漁村＝横浜。のち貿易の中心へ。", "explain": "外国人との接触を管理しやすい場所として選ばれた。", "id": 50, "type": "地名"}, {"s": "開港とその影響", "q": "幕末の貿易における取引相手国で中心になったのはどこか。", "a": "イギリス", "o": ["イギリス", "アメリカ", "ロシア", "オランダ"], "memory": "幕末貿易の中心相手国＝イギリス。", "explain": "工業製品を輸出し、生糸などを輸入する大国だった。", "id": 51, "type": "用語"}, {"s": "開港とその影響", "q": "幕末の貿易における輸出品の上位2品目を取引量の多い順にあげよ。", "a": "生糸・茶", "o": ["生糸・茶", "毛織物・綿織物", "雑穀・蠟", "燃料・食料"], "memory": "輸出は「糸と茶」。日本から出ていくもの。", "explain": "特に生糸は海外需要が高く、国内物価にも影響した。", "id": 52, "type": "用語"}, {"s": "開港とその影響", "q": "幕末の貿易における輸入品の上位2品目を取引量の多い順にあげよ。", "a": "毛織物・綿織物", "o": ["毛織物・綿織物", "生糸・茶", "燃料・食料", "雑穀・蠟"], "memory": "輸入は「毛と綿」。工業製品が入ってくる。", "explain": "イギリスなどから織物が大量に輸入された。", "id": 53, "type": "用語"}, {"s": "開港とその影響", "q": "幕末の貿易開始にともない、多量の金貨が海外に流出した原因は何か。", "a": "金銀比価の相違", "o": ["金銀比価の相違", "領事裁判権", "片務的最恵国待遇", "開港場への直送禁止"], "memory": "金と銀の交換比率の違いで、金が海外へ流れた。", "explain": "日本国内では金が海外より相対的に安く、交換で利益が出た。", "id": 54, "type": "用語"}, {"s": "開港とその影響", "q": "金貨の海外多量流出への対策として、幕府は重量を大幅に減らした小判を鋳造したが、これを何というか。", "a": "万延小判", "o": ["万延小判", "慶長小判", "天保小判", "一分銀"], "memory": "万延＝金を薄くした小判。金流出対策。", "explain": "小判の金含有量を減らしたが、物価上昇にもつながった。", "id": 55, "type": "用語"}, {"s": "開港とその影響", "q": "貿易開始による市場の混乱に対し、幕府が江戸問屋の保護と流通経済の統制のために出した命令を何というか。", "a": "五品江戸廻送令", "o": ["五品江戸廻送令", "異国船打払令", "天保の薪水給与令", "貿易章程"], "memory": "五品を江戸へ回せ、という命令。", "explain": "生糸などが開港場へ直送されるのを抑え、江戸問屋を守ろうとした。", "id": 56, "type": "用語"}, {"s": "開港とその影響", "q": "五品江戸廻送令は西暦何年に出されたか。", "a": "1860年", "o": ["1860年", "1858年", "1859年", "1862年"], "memory": "「人群れ(1860)る幕末事件」", "explain": "五品江戸廻送令や桜田門外の変など、重要事件が重なる年。", "id": 57, "type": "年号"}, {"s": "開港とその影響", "q": "五品江戸廻送令で、開港場への直送が禁じられた5品目のうち、雑穀・蠟・呉服以外の2つをあげよ。", "a": "生糸・水油", "o": ["生糸・水油", "生糸・茶", "毛織物・綿織物", "燃料・食料"], "memory": "五品＝雑穀・水油・蠟・呉服・生糸。抜けを確認。", "explain": "開港場への直送を制限して流通を統制しようとした。", "id": 58, "type": "用語"}, {"s": "開港とその影響", "q": "幕末の尊攘事件として、1860年にオランダ人が江戸赤羽橋で薩摩藩の浪士に殺された。このオランダ人は誰か。", "a": "ヒュースケン", "o": ["ヒュースケン", "ハリス", "プチャーチン", "フィルモア"], "memory": "ハリスの通訳＝ヒュースケン。", "explain": "開国後の攘夷感情の高まりの中で殺害された。", "id": 59, "type": "人物"}, {"s": "開港とその影響", "q": "水戸藩の浪士が1861年に江戸高輪のイギリス仮公使館である寺院を襲撃した事件を何というか。", "a": "東禅寺事件", "o": ["東禅寺事件", "生麦事件", "イギリス公使館焼打ち事件", "桜田門外の変"], "memory": "高輪のイギリス仮公使館＝東禅寺。", "explain": "尊攘運動が外国人襲撃事件として表面化した。", "id": 60, "type": "用語"}, {"s": "開港とその影響", "q": "1862年、江戸から帰る途中の島津久光の行列を横切ったイギリス人が殺傷された。この事件を何というか。", "a": "生麦事件", "o": ["生麦事件", "東禅寺事件", "禁門の変", "寺田屋事件"], "memory": "島津久光の行列を横切った英国人が殺傷＝生麦事件。", "explain": "この事件がのちの薩英戦争につながった。", "id": 61, "type": "用語"}, {"s": "開港とその影響", "q": "1862年、品川御殿山に建築中のイギリス公使館が長州藩の高杉晋作らによって襲撃され全焼した。この事件を何というか。", "a": "イギリス公使館焼打ち事件", "o": ["イギリス公使館焼打ち事件", "東禅寺事件", "生麦事件", "薩英戦争"], "memory": "品川御殿山の英国公使館を高杉晋作らが焼打ち。", "explain": "長州藩の尊攘運動の激化を示す事件。", "id": 62, "type": "用語"}, {"s": "公武合体と尊攘運動", "q": "1853年のペリー来航直後に13代将軍になったのは誰か。", "a": "徳川家定", "o": ["徳川家定", "徳川家慶", "徳川慶喜", "徳川家茂"], "memory": "13代＝家定。病弱で後継ぎ問題へ。", "explain": "ペリー来航直後に将軍となり、将軍継嗣問題の原因になった。", "id": 63, "type": "人物"}, {"s": "公武合体と尊攘運動", "q": "徳川家定は生来病弱で嗣子もなかったため、次期将軍の問題が1857年から公然化したが、これを何というか。", "a": "将軍継嗣問題", "o": ["将軍継嗣問題", "安政の大獄", "桜田門外の変", "公武合体"], "memory": "継嗣＝あとつぎ。将軍の後継者争い。", "explain": "一橋派と南紀派の対立が幕政の大きな争点となった。", "id": 64, "type": "用語"}, {"s": "公武合体と尊攘運動", "q": "14代将軍に賢明な人物を迎え、幕政改革を行って難局を切ろうと考えた人たちが推したのは誰か。", "a": "徳川（一橋）慶喜", "o": ["徳川（一橋）慶喜", "徳川家茂", "徳川家定", "井伊直弼"], "memory": "一橋派が推したのが慶喜。のちの15代将軍。", "explain": "有能な人物として期待され、改革派に支持された。", "id": 65, "type": "人物"}, {"s": "公武合体と尊攘運動", "q": "14代将軍に徳川慶喜を推した人たちは何派と呼ばれたか。", "a": "一橋派", "o": ["一橋派", "南紀派", "尊王攘夷派", "佐幕派"], "memory": "慶喜を推す＝一橋派。家茂を推す＝南紀派。", "explain": "将軍継嗣問題で南紀派と対立した。", "id": 66, "type": "用語"}];
const FLOW=['アヘン戦争の衝撃','ペリー来航','和親条約','ハリス来日','修好通商条約','貿易開始','尊攘事件','将軍継嗣問題'];
let quiz=[],idx=0,points=0,locked=false,mistakes=[],lastN=10,streak=0,typeMiss={};
const RABBITS={ready:['rabbit15.png','rabbit03.png','rabbit05.png'],ok:['rabbit07.png','rabbit10.png','rabbit14.png','rabbit16.png'],ng:['rabbit09.png','rabbit11.png','rabbit12.png'],great:['rabbit06.png','rabbit08.png','rabbit13.png'],finish:['rabbit01.png','rabbit07.png','rabbit10.png'],think:['rabbit05.png','rabbit11.png']};
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function setRabbit(kind,msg,target='gameRabbit'){const el=document.getElementById(target); if(!el)return; el.src='images/'+pick(RABBITS[kind]||RABBITS.ready); el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); const m=document.getElementById(target+'Msg')||document.getElementById('rabbitMsg'); if(m)m.textContent=msg||'';}
function startGame(n){lastN=n;quiz=shuffle(DATA).slice(0,n);idx=0;points=0;mistakes=[];streak=0;typeMiss={};document.getElementById('menu').style.display='none';document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';showQ();}
function showQ(){locked=false;setRabbit('ready','選んで！');const item=quiz[idx];document.getElementById('count').textContent=`${idx+1} / ${quiz.length}`;document.getElementById('score').textContent=`正解 ${points}`;document.getElementById('bar').style.width=`${(idx/quiz.length)*100}%`;document.getElementById('section').textContent=item.s;document.getElementById('typeTag').textContent=item.type;document.getElementById('question').textContent=item.q;document.getElementById('feedback').textContent='';document.getElementById('feedback').className='feedback';document.getElementById('learnBox').classList.remove('show');document.getElementById('nextBtn').disabled=true;const box=document.getElementById('choices');box.innerHTML='';shuffle(item.o).forEach((opt,i)=>{const b=document.createElement('button');b.className='choice';b.textContent=['A','B','C','D'][i]+'. '+opt;b.dataset.value=opt;b.onclick=()=>choose(b,opt,item);box.appendChild(b)});renderLearn(item,false);}
function choose(btn,opt,item){if(locked)return;locked=true;const buttons=[...document.querySelectorAll('.choice')];buttons.forEach(b=>{if(b.dataset.value===item.a)b.classList.add('correct')});if(opt===item.a){points++;streak++;document.getElementById('feedback').textContent=streak>=3?'連続正解！':'正解！';document.getElementById('feedback').classList.add('ok');setRabbit(streak>=3?'great':'ok',streak>=3?'キラーン！':'オーッ!!');beep(880,0.08);setTimeout(()=>beep(1320,0.08),90)}else{streak=0;btn.classList.add('wrong');mistakes.push(item);typeMiss[item.type]=(typeMiss[item.type]||0)+1;document.getElementById('feedback').textContent='惜しい！ここで覚える！';document.getElementById('feedback').classList.add('ng');setRabbit('ng','うーん…');beep(220,0.12);setTimeout(()=>beep(165,0.12),100)}document.getElementById('score').textContent=`正解 ${points}`;renderLearn(item,true);if(document.getElementById('autoLearn').checked)document.getElementById('learnBox').classList.add('show');document.getElementById('nextBtn').disabled=false;document.getElementById('bar').style.width=`${((idx+1)/quiz.length)*100}%`;}
function renderLearn(item,answered){document.getElementById('answer').innerHTML='正解：<b>'+item.a+'</b>';document.getElementById('memory').innerHTML='覚え方：'+item.memory;document.getElementById('explain').innerHTML='背景：'+item.explain;const f=document.getElementById('flowItems');f.innerHTML='';const active=flowIndex(item);FLOW.forEach((x,i)=>{const s=document.createElement('span');s.className='flowItem'+(i===active?' active':'');s.textContent=x;f.appendChild(s)});}
function flowIndex(item){const q=item.q+item.a+item.s;if(q.includes('アヘン')||q.includes('南京')||q.includes('薪水'))return 0;if(q.includes('ペリー')||q.includes('浦賀')||q.includes('フィルモア')||q.includes('台場')||q.includes('安政の改革'))return 1;if(q.includes('和親')||q.includes('プチャーチン')||q.includes('下田・箱館')||q.includes('択捉')||q.includes('樺太'))return 2;if(q.includes('ハリス')||q.includes('堀田')||q.includes('総領事'))return 3;if(q.includes('修好通商')||q.includes('五カ国')||q.includes('井伊')||q.includes('孝明')||q.includes('居留地'))return 4;if(q.includes('貿易')||q.includes('生糸')||q.includes('毛織物')||q.includes('小判')||q.includes('廻送'))return 5;if(q.includes('事件')||q.includes('ヒュースケン')||q.includes('東禅寺')||q.includes('生麦')||q.includes('焼打'))return 6;if(q.includes('将軍')||q.includes('家定')||q.includes('慶喜')||q.includes('一橋'))return 7;return 0;}
function toggleLearn(){document.getElementById('learnBox').classList.toggle('show');}
function nextQ(){idx++; if(idx>=quiz.length)finish(); else showQ();}
function finish(){document.getElementById('game').style.display='none';document.getElementById('result').style.display='block';const pct=Math.round(points/quiz.length*100);document.getElementById('finalScore').textContent=`${points}/${quiz.length}`;setRabbit(pct>=80?'finish':'think',pct===100?'満点！':pct>=80?'すごい！':'復習しよう！','resultRabbit');document.getElementById('finalMsg').textContent=pct===100?'満点！流れまでかなり見えています。':pct>=80?'かなり仕上がっています。間違いだけ暗記カードで確認しよう。':pct>=60?'あと少し。年号・人物・条約をつなげると伸びます。':'まずは答えと背景をセットで反復しよう。';document.getElementById('reviewBtn').style.display=mistakes.length?'inline-block':'none';const weak=Object.entries(typeMiss).sort((a,b)=>b[1]-a[1])[0];document.getElementById('weakMsg').textContent=weak?`今回の弱点候補：${weak[0]}問題。ここを重点復習しよう。`:'';const m=document.getElementById('mistakes');m.innerHTML='';mistakes.forEach(x=>{const d=document.createElement('div');d.className='mistake';d.innerHTML='<b>'+x.a+'</b><br><span class="small">'+x.q+'</span><br><span class="small">覚え方：'+x.memory+'</span>';m.appendChild(d)});}
function reviewMistakes(){if(!mistakes.length)return;quiz=shuffle(mistakes);idx=0;points=0;streak=0;mistakes=[];typeMiss={};document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';showQ();}
function backMenu(){document.getElementById('result').style.display='none';document.getElementById('game').style.display='none';document.getElementById('menu').style.display='block';}
function beep(freq,dur){if(!document.getElementById('soundOn')?.checked)return;try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.frequency.value=freq;o.type='square';g.gain.setValueAtTime(.055,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch(e){}}
</script>
</body>
